<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>RogueCard</title>
<style>
.gw{display:flex;flex-direction:column;align-items:center;padding:1rem 0;gap:10px;}
.gw canvas{
  image-rendering: -moz-crisp-edges;
  image-rendering: -webkit-optimize-contrast;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
  cursor:pointer;
  border:3px solid #444;
  width: 768px;
  height: 690px;
  max-width: 100%;
  max-height: 90vh;
  object-fit: contain;
}
.gw .hint{font-size:12px;color:#aaa;font-family:monospace;text-align:center;line-height:1.6;}
.save-panel {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  margin-top: 10px;
  background: #1a1a24;
  padding: 12px;
  border: 1px solid #333;
  border-radius: 4px;
  width: 742px;
  max-width: 100%;
  box-sizing: border-box;
}
.save-panel input {
  width: 100%;
  padding: 6px;
  background: #000;
  border: 1px solid #555;
  color: #0f0;
  font-family: monospace;
  font-size: 12px;
  text-align: center;
}
.save-panel .btns {
  display: flex;
  gap: 15px;
}
.save-panel button {
  background: #222;
  color: #eee;
  border: 1px solid #aaa;
  padding: 5px 15px;
  cursor: pointer;
  font-family: sans-serif;
  font-size: 12px;
}
.save-panel button:hover {
  background: #f0d000;
  color: #000;
  border-color: #f0d000;
}
</style>
</head>
<body style="background:#111;color:#eee;margin:0;padding:10px;font-family:sans-serif;">
<div class="gw">
<canvas id="gc" width="768" height="690"></canvas>
<p class="hint">
    【セーブ＆ロード対応・バグ修正版】<br>
    Basecamp画面で「PROCEED」および「FORGE」ボタンがクリックできなかった判定バグを修正しました。<br>
    画面下のパネルから進行状況の保存・再開が可能です。
</p>

<div class="save-panel">
  <input type="text" id="saveCode" placeholder="ここにセーブコードが出力されます / 再開時はここに貼り付けます" onclick="this.select()">
  <div class="btns">
    <button onclick="exportSaveCode()">セーブコードを出力</button>
    <button onclick="importSaveCode()">セーブコードからロード</button>
  </div>
</div>
</div>

<script>
// --- main.js ---
const cv=document.getElementById('gc'), cx=cv.getContext('2d');
const W=512, H=460;
let audioCtx=null;
function getAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function beep(freq,dur,type='square',vol=0.1,delay=0){
  try{
    const a=getAudio(),o=a.createOscillator(),g=a.createGain();
    o.connect(g);g.connect(a.destination);
    o.type=type;o.frequency.value=freq;
    g.gain.setValueAtTime(vol,a.currentTime+delay);
    g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+delay+dur);
    o.start(a.currentTime+delay);o.stop(a.currentTime+delay+dur+0.01);
  }catch(e){}
}
function sfxDraw(){ beep(600,0.04,'triangle',0.06); beep(800,0.04,'triangle',0.06,0.03); }
function sfxAttack(){ beep(150,0.12,'sawtooth',0.12); beep(90,0.08,'sawtooth',0.1,0.04); }
function sfxDefend(){ beep(523,0.05,'sine',0.12); beep(659,0.08,'sine',0.1,0.03); }
function sfxTurnEnd(){ beep(250,0.08,'square',0.06); beep(180,0.12,'square',0.06,0.06); }
function sfxEnemy(){ beep(100,0.15,'sawtooth',0.12); }
function sfxWin(){ [523,659,784,1047].forEach((f,i)=>beep(f,0.08,'square',0.08,i*0.06)); }
function sfxRare(){ [440,554,659,880,1109].forEach((f,i)=>beep(f,0.05,'square',0.08,i*0.04)); }
function sfxRarePower(){ [587,698,880,1175].forEach((f,i)=>beep(f,0.06,'square',0.08,i*0.05)); }
function sfxLvUp(){ [523,659,784,1047,1319].forEach((f,i)=>beep(f,0.06,'square',0.1,i*0.05)); }
function sfxDeath(){ beep(120,0.4,'sawtooth',0.2); beep(80,0.3,'sawtooth',0.2,0.1); }
// ==================== シードシステム ====================
let gameSeed = "";
let rngState = 1;
function setSeed(s) {
  gameSeed = s.toUpperCase();
  let hash = 0;
  for (let i = 0; i < gameSeed.length; i++) {
    hash = (hash << 5) - hash + gameSeed.charCodeAt(i);
    hash |= 0;
  }
  rngState = hash === 0 ? 1 : hash;
}
function gameRandom() {
  let x = Math.sin(rngState++) * 10000;
  return x - Math.floor(x);
}
function generateRandomSeed() {
  const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
  let s = "";
  for (let i = 0; i < 4; i++) s += chars[Math.floor(Math.random() * chars.length)];
  s += "-";
  for (let i = 0; i < 4; i++) s += chars[Math.floor(Math.random() * chars.length)];
  return s;
}
// ==================== データ＆状態管理 ====================
let pMaterial = 0;
let totalMaterialGained = 0; 
let baseBuildings = { armory: 0, infirmary: 0, arcaneTower: 0, tradingPost: 0, trainingGround: 0, alchemyLab: 0, defenseWall: 0 };
let activeForgeProject = null;
let totalSynthesisCount = 0; 
let currentFloor = 1;
let gameState = "BATTLE"; 
let fc = 0, flashFrame = 0;
let enemyShakeFrame = 0; 
let enemyDeathFrame = 0; 
let pHP = 50, pMaxHP = 50, pEnergy = 3, pMaxEnergy = 3, pBlock = 0, pPower = 0, pGold = 45, pExp = 0, pLv = 1;
let pPoison = 0, pWeak = 0, pVuln = 0;
let pRelics = { redGem: false, blueGem: false, greenGem: false, funnel: false, ninjaScroll: false, letterOpener: false, echoRing: false, burningBlood: false, sneckoSkull: false, mummifiedHand: false, goldBag: false, loopCrown: false, voidStone: false, battleStandard: false, arcaneBattery: false, goldenScale: false, venomVial: false };
let playedHandLength = 0;
let mapOptions = [];
let upgradeTargetIdx = -1; 
let upgradeSource = ""; 
let deckViewSource = "DECK"; 
let turnAtkCount = 0;
let turnDefCount = 0;
let isFirstAtkInTurn = true;
let activeRupturesCount = 0;
let activeIronSkinCount = 0;
let activeAccuracyBonus = 0;
let activeInfiniteBladesCount = 0;
let activeDarkEmbraceCount = 0;
let activeFeelNoPainCount = 0;
let pReflect = 0;
let nextTurnEnergyMod = 0;
let activeCombustCount = 0;
let nextCardCostMod = 0;
let isFirstTurnOfCombat = false;
let pPotions = [];
let handCostMods = [];
let nextTurnBlock = 0;
let combatAtkCount = 0;
let pFrail = 0;
let pClass = "";
let currentLoop = 1;
let maxLoopReached = 1;
let activeSlimeSplitted = false;
let slimeChildHP1 = 0;
let slimeChildHP2 = 0;
let eventType = "";
let totalDamageDealt = 0;
let totalTurns = 0;
let maxComboDmg = 0;
let turnDamageDealt = 0;
let lastEnemyAttackName = "";
const POTION_MASTER = {
  "healP": { name: "HP POTION", desc: "HPを 15 回復します。" },
  "poisP": { name: "POISON POTION", desc: "敵に 毒 を 5 付与します。" },
  "shieldP": { name: "SHIELD POTION", desc: "シールドを 8 得ます。" }
};
let eName = "", eHP = 30, eMaxHP = 30, eBlock = 0, eType = "", eTurnCount = 0, eExpReward = 0;
let eIntent = { action: "ATTACK", type: "⚔️", name: "STRIKE", value: 6 };
let ePoison = 0, eWeak = 0, eVuln = 0, eThorns = 0;
let ePhase2Triggered = false;
let ePhase2Gimmick = ""; 
let masterDeck = ["strike", "strike", "strike", "strike", "strike", "defend", "defend", "defend", "defend", "bash", "quick"];
let deck = [], hand = [], discard = [];
let selectedIdx = -1;
let rewardOptions = [];
let shopInventory = []; 
let activeShopItemIdx = -1; 
let dmgPopups = []; 
let mx = 0, my = 0;
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(gameRandom() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}
function decideEnemyIntent() {
  eTurnCount++;
  if (eType === "goblin") {
    if (eTurnCount % 3 === 0) eIntent = { action: "ATTACK", type: "⚔️", name: "SHARP CLAW", value: 4, poison: 1, frail: 1 };
    else eIntent = { action: "ATTACK", type: "⚔️", name: "RUSH", value: 5 };
  } else if (eType === "slime") {
    if (eHP <= (eMaxHP / 2) && !activeSlimeSplitted) {
      eIntent = { action: "DEFEND", type: "🧬", name: "SPLIT", value: 0 };
    } else {
      if (eTurnCount % 2 === 1) eIntent = { action: "DEFEND", type: "🛡️", name: "SLIME SHIELD", value: 8 };
      else eIntent = { action: "ATTACK", type: "⚔️", name: "TACKLE", value: 6 };
    }
  } else if (eType === "orc") {
    let orcRage = Math.max(0, eTurnCount - 3) * 2;
    if (orcRage > 0 && eTurnCount === 4) dmgPopups.push({ text: `ORC ENRAGED! ATK+${orcRage}`, x: 380, y: 100, col: RED, frames: 50 });
    if (eTurnCount % 3 === 0) eIntent = { action: "ATTACK", type: "💥", name: "HEAVY SMASH", value: 16 + orcRage };
    else if (eTurnCount % 3 === 1) eIntent = { action: "ATTACK", type: "📣", name: "CHALLENGE", value: 0 };
    else eIntent = { action: "DEFEND", type: "🛡️", name: "BRACE", value: 6 };
  } else if (eType === "mage") {
    if (eTurnCount % 3 === 1) eIntent = { action: "ATTACK", type: "🔮", name: "FIRE BOLT", value: 12 };
    else if (eTurnCount % 3 === 2) eIntent = { action: "ATTACK", type: "⚠️", name: "SPOIL", value: 0 };
    else eIntent = { action: "ATTACK", type: "💀", name: "ARCANE CURSE", value: 4, vuln: 2 };
  } else if (eType === "dragon") {
    let isPhase2 = eHP <= (eMaxHP / 2);
    if (eTurnCount % 3 === 1) eIntent = { action: "ATTACK", type: "🔥", name: isPhase2 ? "HELLFIRE" : "DRAGON BREATH", value: isPhase2 ? 24 : 16, poison: isPhase2 ? 3 : 0 };
    else if (eTurnCount % 3 === 2) eIntent = { action: "DEFEND", type: "🛡️", name: "SCALE GUARD", value: isPhase2 ? 8 : 14 };
    else eIntent = { action: "ATTACK", type: "⚔️", name: isPhase2 ? "VENOM BITE" : "BITE", value: 10, poison: isPhase2 ? 2 : 0 };
  } else if (eType === "lich") {
    let isPhase2 = eHP <= (eMaxHP / 2);
    if (eTurnCount % 3 === 1) eIntent = { action: "ATTACK", type: "💀", name: "DARK CURSE", value: 0 };
    else if (eTurnCount % 3 === 2) eIntent = { action: "ATTACK", type: "🔮", name: "NECRO BEAM", value: isPhase2 ? 20 : 14 };
    else eIntent = { action: "DEFEND", type: "🛡️", name: "SOUL BARRIER", value: 15 };
  }
  
  if (eType === "slime" && eIntent.action === "ATTACK") {
    let childBonus = (slimeChildHP1 > 0 ? 4 : 0) + (slimeChildHP2 > 0 ? 4 : 0);
    if (childBonus > 0) {
      eIntent.value += childBonus;
      eIntent.name = `TACKLE (+${childBonus})`;
    }
  }

  if (eIntent.action === "ATTACK" && eIntent.value > 0) {
    let dmgMultiplier = 1 + (currentLoop - 1) * 0.3;
    eIntent.value = Math.floor(eIntent.value * dmgMultiplier);
  }
  
  if (eType === "dragon" && ePhase2Triggered && ePhase2Gimmick === "ancient_power" && eIntent.action === "ATTACK") {
    let powerStacks = Math.max(0, eTurnCount - 3) * 3;
    eIntent.value += powerStacks;
    if (powerStacks > 0) dmgPopups.push({ text: `ANCIENT POWER +${powerStacks}`, x: 380, y: 95, col: PURPLE, frames: 35 });
  }
}
function drawCards(num) {
  for (let i = 0; i < num; i++) {
    if (hand.length >= 10) break;
    if (deck.length === 0) {
      triggerDiscardBlockLogic(discard.length); 
      deck = [...discard]; discard = []; shuffle(deck);
    }
    if (deck.length > 0) {
      hand.push(deck.pop());
      handCostMods.push(0);
    }
  }
  sfxDraw();
}
function triggerDiscardBlockLogic(amount) {
  if (activeIronSkinCount > 0 && amount > 0) {
    let ironBlock = activeIronSkinCount * 3;
    pBlock += ironBlock;
    dmgPopups.push({ text: `IRON SKIN +${ironBlock}`, x: 100, y: 110, col: CYAN, frames: 35 });
  }
}
function triggerExhaustLogic() {
  if(activeDarkEmbraceCount > 0) {
    drawCards(activeDarkEmbraceCount);
    dmgPopups.push({ text: "DARK EMBRACE DRAW", x: 100, y: 90, col: PURPLE, frames: 35 });
  }
  if(activeFeelNoPainCount > 0) {
    pBlock += activeFeelNoPainCount;
    dmgPopups.push({ text: `FEEL NO PAIN +${activeFeelNoPainCount}`, x: 100, y: 110, col: CYAN, frames: 35 });
  }
}
function runEnemyTurn() {
  totalTurns++;
  if (turnDamageDealt > maxComboDmg) maxComboDmg = turnDamageDealt;
  turnDamageDealt = 0;

  gameState = "ENEMY_TURN";
  sfxTurnEnd();
  
  if (pWeak > 0) pWeak--;
  if (pVuln > 0) pVuln--;
  if (pFrail > 0) pFrail--;

  function applyCurseDmg(dmg, label, popupY) {
    if (pBlock >= dmg) {
      pBlock -= dmg;
      dmgPopups.push({ text: `${label} BLOCKED`, x: 100, y: popupY, col: "#00c8d0", frames: 40 });
    } else {
      let through = dmg - pBlock; pBlock = 0; pHP = Math.max(0, pHP - through);
      dmgPopups.push({ text: `${label} -${through} HP`, x: 100, y: popupY, col: RED, frames: 40 });
    }
    return pHP <= 0;
  }

  let regretCount = hand.filter(k => k === "regret").length;
  if (regretCount > 0) {
    if (applyCurseDmg(regretCount * 2, "REGRET", 150)) { lastEnemyAttackName = "REGRET CURSE"; gameState = "GAMEOVER"; return; }
  }
  let decayCount = hand.filter(k => k === "decay").length;
  if (decayCount > 0) {
    if (applyCurseDmg(decayCount * 3, "DECAY", 135)) { lastEnemyAttackName = "DECAY CURSE"; gameState = "GAMEOVER"; return; }
  }
  let burnCount = hand.filter(k => k === "burn").length;
  if (burnCount > 0) {
    if (applyCurseDmg(burnCount * 1, "BURN", 120)) { lastEnemyAttackName = "BURN BURNING"; gameState = "GAMEOVER"; return; }
  }
  let strainCount = hand.filter(k => k === "heavyStrain").length;
  if (strainCount > 0) {
    if (applyCurseDmg(strainCount * currentLoop, "STRAIN", 110)) { lastEnemyAttackName = "STRAIN LOOP DAMAGE"; gameState = "GAMEOVER"; return; }
  }

  let retained = [];
  let toDiscard = [];
  hand.forEach(cKey => {
    if (CARD_MASTER[cKey] && CARD_MASTER[cKey].retain) {
      retained.push(cKey);
    } else {
      toDiscard.push(cKey);
    }
  });

  triggerDiscardBlockLogic(toDiscard.length);
  discard.push(...toDiscard);
  hand = [...retained];

  setTimeout(() => {
    if (activeCombustCount > 0 && eHP > 0) {
      eHP -= activeCombustCount;
      enemyShakeFrame = 6;
      dmgPopups.push({ text: `COMBUST -${activeCombustCount}`, x: 380, y: 150, col: RED, frames: 35 });
      if (eHP <= 0) { eHP = 0; triggerEnemyDeathAnim(); return; }
    }

    if (ePoison > 0) {
      eHP -= ePoison;
      enemyShakeFrame = 10; 
      dmgPopups.push({ text: `POISON -${ePoison}`, x: 380, y: 140, col: GREEN, frames: 35 });
      ePoison--;
      if (eHP <= 0) { eHP = 0; triggerEnemyDeathAnim(); return; }
    }

    sfxEnemy();
    let baseEValue = eIntent.value;
    if (eWeak > 0) baseEValue = Math.floor(baseEValue * 0.5);

    if (eIntent.action === "ATTACK") {
      lastEnemyAttackName = eName + " (" + eIntent.name + ")";
      let dmg = baseEValue;
      if (pVuln > 0) dmg = Math.floor(dmg * 1.5);

      if (pBlock >= dmg) {
        pBlock -= dmg;
        dmgPopups.push({ text: "BLOCKED", x: 100, y: 160, col: "#00c8d0", frames: 35 });
      } else {
        dmg -= pBlock; pBlock = 0; pHP -= dmg;
        dmgPopups.push({ text: `-${dmg}`, x: 100, y: 160, col: '#d82800', frames: 35 });
        flashFrame = 6;
      }

      if(pReflect > 0 && eHP > 0) {
        eHP -= pReflect;
        dmgPopups.push({ text: `BARRIER REFLECT -${pReflect}`, x: 380, y: 160, col: RED, frames: 35 });
        if (eHP <= 0) { eHP = 0; triggerEnemyDeathAnim(); return; }
      }
      if (eIntent.poison) {
        pPoison += eIntent.poison;
        dmgPopups.push({ text: `POISONED +${eIntent.poison}`, x: 100, y: 180, col: GREEN, frames: 35 });
      }
      if (eIntent.vuln) {
        pVuln += eIntent.vuln;
        dmgPopups.push({ text: `VULNERABLE +${eIntent.vuln}`, x: 100, y: 195, col: YELLOW, frames: 35 });
      }
      if (eIntent.frail) {
        pFrail += eIntent.frail;
        dmgPopups.push({ text: `FRAIL +${eIntent.frail}`, x: 100, y: 195, col: YELLOW, frames: 35 });
      }
      if (eType === "mage" && eIntent.name === "ARCANE CURSE") {
        deck.push("burn");
        shuffle(deck);
        dmgPopups.push({ text: "🔥BURN ADDED TO DECK", x: 256, y: 220, col: RED, frames: 50 });
      }
      if (eType === "mage" && eIntent.name === "SPOIL") {
        if (hand.length < 10) { hand.push("wound"); handCostMods.push(0); }
        if (hand.length < 10) { hand.push("wound"); handCostMods.push(0); }
        dmgPopups.push({ text: "⚠️ SPOILED: WOUND x2 ADDED", x: 256, y: 220, col: GRAY, frames: 50 });
      }
      if (eType === "lich" && eIntent.name === "DARK CURSE") {
        let curses = ["regret", "decay"];
        let selectedC = curses[Math.floor(gameRandom() * curses.length)];
        deck.push(selectedC);
        shuffle(deck);
        dmgPopups.push({ text: `💀 CURSE: ${CARD_MASTER[selectedC].name} ADDED`, x: 256, y: 220, col: PURPLE, frames: 55 });
      }
      if (eType === "lich" && eHP <= (eMaxHP / 2) && !ePhase2Triggered) {
        ePhase2Triggered = true;
        flashFrame = 20;
        dmgPopups.push({ text: "💀 THE LICH LAUGHS COLDLY! 💀", x: 256, y: 170, col: PURPLE, frames: 70 });
        dmgPopups.push({ text: "PHASE 2: EVERY TURN FRAIL +1", x: 256, y: 195, col: RED, frames: 60 });
        beep(90, 0.4, 'sawtooth', 0.25); beep(70, 0.35, 'sawtooth', 0.2, 0.12);
      }
      if (eType === "dragon" && eHP <= (eMaxHP / 2) && !ePhase2Triggered) {
        ePhase2Triggered = true;
        let gimmicks = ["flame_aura", "curse_energy", "ancient_power"];
        ePhase2Gimmick = gimmicks[Math.floor(gameRandom() * gimmicks.length)];
        flashFrame = 20;
        dmgPopups.push({ text: "🐲 THE DRAGON ROARS! 🐲", x: 256, y: 170, col: YELLOW, frames: 70 });
        dmgPopups.push({ text: "PHASE 2 ACTIVATED", x: 256, y: 190, col: RED, frames: 60 });
        let gimmickText = ePhase2Gimmick === "flame_aura" ? "🔥FLAME AURA: BLOCK HALVED" :
                          ePhase2Gimmick === "curse_energy" ? "💠CURSE: MAX ENERGY -1" :
                          "🐲ANCIENT POWER: ATK+3/TURN";
        dmgPopups.push({ text: gimmickText, x: 256, y: 210, col: PURPLE, frames: 80 });
        deck.push("wound"); deck.push("wound");
        shuffle(deck);
        dmgPopups.push({ text: "WOUND x2 ADDED TO DECK", x: 256, y: 240, col: GRAY, frames: 50 });
        if (ePhase2Gimmick === "curse_energy") {
          pMaxEnergy = Math.max(1, pMaxEnergy - 1);
        }
        beep(80, 0.5, 'sawtooth', 0.3); beep(60, 0.4, 'sawtooth', 0.25, 0.15);
      }

    } else if (eIntent.action === "DEFEND") {
      if (eIntent.name === "SPLIT") {
        activeSlimeSplitted = true;
        slimeChildHP1 = 10;
        slimeChildHP2 = 10;
        ePoison = 0; 
        eWeak = eVuln = 0;
        dmgPopups.push({ text: "SPLIT: 2 MINI-SLIMES SPAWNED", x: 256, y: 170, col: CYAN, frames: 60 });
      } else if (eIntent.name === "SOUL BARRIER") {
        eBlock += baseEValue;
        eThorns += 2;
        dmgPopups.push({ text: `+${baseEValue} BLOCK / THORNS +2`, x: 380, y: 160, col: CYAN, frames: 45 });
      } else {
        eBlock += baseEValue;
        dmgPopups.push({ text: `+${baseEValue} BLOCK`, x: 380, y: 160, col: "#00c8d0", frames: 35 });
      }
    }

    setTimeout(() => {
      if (pHP <= 0) { pHP = 0; gameState = "GAMEOVER"; }
      else { eBlock = 0; startPlayerTurn(); }
    }, 500);
  }, 600);
}
function initGame() {
  if (!gameSeed) setSeed(generateRandomSeed());
  else setSeed(gameSeed);
  
  currentFloor = 1; pPower = 0; pGold = 45; pExp = 0; pLv = 1; pMaxEnergy = 3;
  pPoison = pWeak = pVuln = 0;
  activeRupturesCount = 0;
  activeIronSkinCount = 0;
  activeAccuracyBonus = 0;
  activeInfiniteBladesCount = 0;
  activeDarkEmbraceCount = 0;
  activeFeelNoPainCount = 0;
  pReflect = 0;
  nextTurnEnergyMod = 0;
  activeCombustCount = 0;
  nextCardCostMod = 0;
  pRelics = { redGem: false, blueGem: false, greenGem: false, funnel: false, ninjaScroll: false, letterOpener: false, echoRing: false, burningBlood: false, sneckoSkull: false, mummifiedHand: false, goldBag: false, loopCrown: false, voidStone: false, battleStandard: false, arcaneBattery: false, goldenScale: false, venomVial: false };
  pPotions = [];
  handCostMods = [];
  nextTurnBlock = 0;
  pFrail = 0;
  currentLoop = 1;
  maxLoopReached = 1;
  activeSlimeSplitted = false;
  slimeChildHP1 = 0;
  slimeChildHP2 = 0;
  
  totalDamageDealt = 0;
  totalTurns = 0;

function getCardGeometry(handLength, index) {
  let cardW, cardH, gap, startY;
  if (handLength <= 5) {
    cardW = 74; cardH = 110; gap = 8; startY = 336;
  } else if (handLength <= 7) {
    cardW = 62; cardH = 100; gap = 4; startY = 346;
  } else if (handLength <= 9) {
    cardW = 48; cardH = 88; gap = 2; startY = 354;
  } else {
    cardW = Math.floor((W - 20) / handLength - 1);
    cardH = 80; gap = 1; startY = 360;
  }
  const totalW = handLength * cardW + (handLength - 1) * gap;
  const startX = Math.max(2, (W - totalW) / 2);
  const cxPos = startX + index * (cardW + gap);
  return { x: cxPos, y: startY, w: cardW, h: cardH };
}

      dmgPopups.push({ text: `UPGRADED: ${CARD_MASTER[selectedUp].name}`, x: 200, y: 200, col: YELLOW, frames: 40 });
      let trainBonus = getBaseEffect("trainingGround");
      if (trainBonus > 0) { pPower += trainBonus; dmgPopups.push({ text: `TRAINING GROUND: POWER +${trainBonus}`, x: 256, y: 170, col: "#FFA500", frames: 45 }); }
      setTimeout(() => { if (upgradeSource === "CAMPFIRE") proceedToNextFloor(); else generateRewardOptions(); }, 800);
    }
    return;
  }

  if (gameState === "REWARD") {
    if (mx >= 196 && mx <= 316 && my >= 315 && my <= 345) { pHP = Math.min(pMaxHP, pHP + 15); proceedToNextFloor(); return; }
    for(let i=0; i<3; i++) { if (mx >= 76 + i * 130 && mx <= 76 + i * 130 + 100 && my >= 135 && my <= 285) { masterDeck.push(rewardOptions[i]); proceedToNextFloor(); return; } }
    return;
  }

  if (gameState === "SHOP") {
    const sW = 86, sH = 150, sY = 125, gap = 10;
    for(let i=0; i<shopInventory.length; i++) {
      let item = shopInventory[i]; if (mx >= 18 + i * (sW + gap) && mx <= 18 + i * (sW + gap) + sW && my >= sY && my <= sY + sH && !item.bought) {
        if (pGold >= item.cost) {
          pGold -= item.cost; sfxRare();
          if (item.type === "REMOVE") { activeShopItemIdx = i; gameState = "SHOP_REMOVE"; }
          else if (item.type === "POTION") {
            if (pPotions.length < 2) { item.bought = true; let types = ["healP", "poisP", "shieldP"]; let rType = types[Math.floor(Math.random() * types.length)]; pPotions.push(rType); }
            else { pGold += item.cost; beep(140, 0.08, 'square', 0.1); }
          } else if (item.type === "RELIC") { item.bought = true; pRelics[item.relicKey] = true; }
          else if (item.type === "CARD") { item.bought = true; masterDeck.push(item.cardKey); }
        }
        return;
      }
    }
    if (mx >= 206 && mx <= 306 && my >= 330 && my <= 360) proceedToNextFloor();
    return;
  }

  if (gameState === "SHOP_REMOVE") {
    let startX = 46, startY = 90;
    for(let i=0; i<masterDeck.length; i++) {
      if (mx >= startX + (i % 5) * 84 && mx <= startX + (i % 5) * 84 + 76 && my >= startY + Math.floor(i / 5) * 50 && my <= startY + Math.floor(i / 5) * 50 + 40) {
        masterDeck.splice(i, 1); sfxAttack(); if(activeShopItemIdx !== -1) shopInventory[activeShopItemIdx].bought = true;
        gameState = "SHOP"; return;
      }
    }
    return;
  }

  if (gameState === "DECK_VIEW") { gameState = "BATTLE"; sfxDefend(); return; }

  if (gameState === "BATTLE") {
    if (mx >= 16 && mx <= 40 && my >= 245 && my <= 275) { deckViewSource = "DECK"; gameState = "DECK_VIEW"; sfxRare(); return; }
    if (mx >= 472 && mx <= 496 && my >= 245 && my <= 275) { deckViewSource = "DISCARD"; gameState = "DECK_VIEW"; sfxRare(); return; }

    let potY = 52;
    for (let i = 0; i < pPotions.length; i++) {
      if (mx >= 20 + i * 28 && mx <= 20 + i * 28 + 22 && my >= potY && my <= potY + 22) {
        let pot = pPotions[i];
        if (pot === "healP") pHP = Math.min(pMaxHP, pHP + 15);
        else if (pot === "poisP") ePoison += 5 + (pRelics.sneckoSkull ? 1 : 0);
        else if (pot === "shieldP") pBlock += 8;
        sfxDefend(); pPotions.splice(i, 1); selectedIdx = -1; return;
      }
    }
    if (mx >= 415 && mx <= 495 && my >= 298 && my <= 328) { runEnemyTurn(); return; }
  }

  if (gameState !== "BATTLE") return;

  if (selectedIdx !== -1 && selectedIdx < hand.length) {
    const targetIdx = selectedIdx; const cardKey = hand[targetIdx]; const cData = CARD_MASTER[cardKey];
    if (cData.centerOnly && targetIdx !== Math.floor(hand.length / 2)) { beep(140, 0.08, 'square', 0.1); return; }

    let currentCost = Math.max(0, cData.cost - nextCardCostMod - (handCostMods[targetIdx] || 0));
    if (pEnergy >= currentCost) {
      pEnergy -= currentCost; if (nextCardCostMod > 0) nextCardCostMod = 0; 
      playedCardIdx = targetIdx; playedHandLength = hand.length;
      hand.splice(targetIdx, 1); handCostMods.splice(targetIdx, 1);
      
      if (!cData.exhaust) discard.push(cardKey);
      else triggerExhaustLogic();

      let triggerEcho = (pRelics.echoRing && cData.type === "ATK" && isFirstAtkInTurn);
      if(cData.type === "ATK" && isFirstAtkInTurn) isFirstAtkInTurn = false;

      executeCardEffect(cardKey, false);
      if (triggerEcho && eHP > 0) { setTimeout(() => { if (eHP > 0) executeCardEffect(cardKey, false); }, 250); }
      selectedIdx = -1;
      if (eHP <= 0) { eHP = 0; hand = []; discard = []; triggerEnemyDeathAnim(); }
    } else {
      beep(140, 0.08, 'square', 0.1); 
    }
  }
});
window.addEventListener('keydown', e => {
  if (gameState !== "BATTLE") return;
  if (e.code === "Space") runEnemyTurn();
  if (e.key >= '1' && e.key <= '9') {
    let idx = parseInt(e.key) - 1;
    if (idx < hand.length) { selectedIdx = idx; cv.dispatchEvent(new Event('click')); }
  }
});
initGame();
loop();

function getBaseEffect(key) {

  if (lv === 0) return 0;
  let base = BASE_MASTER[key].effectPerLv * lv;
  if ((pClass === "WARRIOR" && key === "armory") ||
      (pClass === "MAGE" && key === "arcaneTower") ||
      (pClass === "MERCHANT" && key === "tradingPost")) {
    base = Math.ceil(base * 1.5);
  }
  return base;
}
function getBaseBuildCost(key) {
  let lv = baseBuildings[key] || 0;
  let data = BASE_MASTER[key];
  return Math.floor(data.baseCost * (1 + lv * 0.5));

function calculatePredictedDamage(cData, idx = -1, handLen = 0) {
  let baseDmg = cData.value;
  let armoryBonus = (cData.type === "ATK") ? getBaseEffect("armory") : 0;
  let playerFinalPowerBonus = pPower + (pRelics.redGem ? 2 : 0) + (pRelics.loopCrown ? 3 : 0) + armoryBonus;
  
  baseDmg += activeAccuracyBonus;
  
  if (cData.isShieldBash) baseDmg = Math.floor(pBlock * (cData.valueFactor || 0.7));
  else if (cData.isExecute && eHP <= (eMaxHP / 2)) baseDmg = 20;
  else if (cData.isFortress) baseDmg = cData.value + Math.floor(pBlock * 0.5) + activeAccuracyBonus;
  else if (cData.isToxicDmg) baseDmg = cData.value + (ePoison * 3) + activeAccuracyBonus;
  else if (cData.isBarrierBlast) baseDmg = cData.value + pBlock + activeAccuracyBonus;
  else if (cData.isBodySlam) baseDmg = pBlock;
  else if (cData.isShieldSlam) baseDmg = pBlock * (cData.factor || 2);
  else if (cData.strengthSynergy) baseDmg = cData.value + playerFinalPowerBonus + activeAccuracyBonus;
  else if (cData.risky || cData.isOffering) baseDmg = 12 + activeAccuracyBonus;
  else if (cData.goldSlam) baseDmg = Math.floor(pGold * 0.2);
  else if (cData.leftBlast) {
    let actIdx = (idx !== -1) ? idx : playedCardIdx;
    baseDmg = (actIdx === 0) ? 16 : 6;
  }

  let finalVal = baseDmg;
  if (pWeak > 0) finalVal = Math.floor(finalVal * 0.5);
  finalVal += playerFinalPowerBonus;
  if (eVuln > 0) finalVal = Math.floor(finalVal * 1.5);
  
  return finalVal;
}

      let isHover = (mx >= sX && mx <= sX + sW && my >= sY && my <= sY + sH) && !item.bought;
      cx.fillStyle = item.bought ? '#222' : (isHover ? '#332211' : '#17130e'); cx.fillRect(sX, sY, sW, sH);
      cx.strokeStyle = item.bought ? GRAY : (isHover ? YELLOW : WHITE); cx.strokeRect(sX, sY, sW, sH);

      if (!item.bought) {
        if (item.type === "REMOVE") {
          px("REMOVE", sX + sW/2, sY + 30, RED, 11, true); px("CARD", sX + sW/2, sY + 45, RED, 11, true);
          px("deck slim", sX + sW/2, sY + 75, '#aaa', 6, true);
          if (isHover) activeTooltip = { name: "CARD REMOVE", desc: "デッキから任意のカードを1枚永久除外します。" };
        } else if (item.type === "POTION") {
          px("POTION", sX + sW/2, sY + 35, GREEN, 11, true); px("HEAL HP", sX + sW/2, sY + 75, WHITE, 8, true);
          if (isHover) activeTooltip = { name: "HP POTION", desc: "戦闘中に使用: HP +15 回復します。" };
        } else if (item.type === "RELIC") {
          let rData = RELIC_MASTER[item.relicKey];
          px("★RELIC★", sX + sW/2, sY + 25, YELLOW, 9, true); px(rData.name, sX + sW/2, sY + 45, CYAN, 8, true);
          if (isHover) activeTooltip = { name: rData.name, desc: rData.desc };
        } else if (item.type === "CARD") {
          let cData = CARD_MASTER[item.cardKey];
          px(cData.name, sX + sW/2, sY + 28, cData.rare==="RARE"?PURPLE:WHITE, cData.name.length>8?6:9, true);
          px(`[${cData.type}] ${cData.cost}MP`, sX + sW/2, sY + 44, cData.type==="ATK"?RED:CYAN, 7, true);
          let descWords = cData.desc; 
          if (descWords.length <= 14) {
            px(descWords, sX + sW/2, sY + 78, '#aaa', 6, true);
          } else {
            px(descWords.substring(0, 14), sX + sW/2, sY + 72, '#aaa', 6, true);
            px(descWords.substring(14), sX + sW/2, sY + 83, '#aaa', 6, true);
          }
          if (isHover) activeTooltip = { name: cData.name, desc: `[${cData.type}] Cost:${cData.cost} | ${cData.desc}` };
        }
        px(`${item.cost}G`, sX + sW/2, sY + 132, YELLOW, 11, true);
      } else {
        px("SOLD OUT", sX + sW/2, sY + 75, GRAY, 11, true);
      }
    }
    let isLeaveHover = (mx >= 206 && mx <= 306 && my >= 330 && my <= 360);
    cx.fillStyle = isLeaveHover ? '#444' : '#222'; cx.fillRect(206, 330, 100, 30);
    cx.strokeStyle = WHITE; cx.strokeRect(206, 330, 100, 30); px("LEAVE SHOP", 256, 349, WHITE, 11, true);
  }

  if (gameState === "SHOP_REMOVE") {
    cx.fillStyle = 'rgba(10,0,0,0.95)'; cx.fillRect(0, 0, W, H);
    px("SELECT 1 CARD TO DISCARD FOREVER", W/2, 45, RED, 14, true);
    let startX = 46, startY = 90;
    for(let i=0; i<masterDeck.length; i++) {
      let rX = startX + (i % 5) * 84; let rY = startY + Math.floor(i / 5) * 50;
      let isHover = (mx >= rX && mx <= rX + 76 && my >= rY && my <= rY + 40);
      cx.fillStyle = isHover ? '#400' : '#1c1c1c'; cx.fillRect(rX, rY, 76, 40);
      cx.strokeStyle = isHover ? YELLOW : GRAY; cx.strokeRect(rX, rY, 76, 40);
      let cData = CARD_MASTER[masterDeck[i]];
      px(cData.name, rX + 38, rY + 20, cData.rare==="RARE"?PURPLE:WHITE, cData.name.length>8?6:9, true);
    }
  }

  if (gameState === "GAMEOVER") {
    cx.fillStyle = 'rgba(0,0,0,0.88)'; cx.fillRect(0, 0, W, H);
    px("YOU DIED", W/2, H/2 - 100, RED, 26, true);
    px(`死亡原因: ${lastEnemyAttackName}`, W/2, H/2 - 65, '#ff8888', 11, true);
    px(`到達階層: FLOOR ${currentFloor} (LOOP ${currentLoop})`, W/2, H/2 - 40, WHITE, 11, true);
    
    let totalBaseLv = Object.values(baseBuildings).reduce((a, b) => a + b, 0);
    px(`--- 基地経営リザルト ---`, W/2, H/2 - 15, "#FFA500", 11, true);
    px(`総施設レベル: Lv.${totalBaseLv}  /  総獲得マテリアル: ${totalMaterialGained}M`, W/2, H/2 + 5, WHITE, 10, true);
    px(`カード合成回数: ${totalSynthesisCount}回`, W/2, H/2 + 22, "#FFD700", 10, true);
    
    px(`戦闘ターン数: ${totalTurns}  /  総与ダメージ: ${totalDamageDealt}`, W/2, H/2 + 45, WHITE, 10, true);
    px(`最大コンボ火力: ${maxComboDmg}`, W/2, H/2 + 62, YELLOW, 10, true);
    px("CLICK TO RESTART", W/2, H/2 + 95, GRAY, 11, true);
  }

  if (gameState === "ENDING") {
    cx.fillStyle = 'rgba(5,15,10,0.97)'; cx.fillRect(0, 0, W, H);
    px("👑 CONGRATULATIONS! 👑", W/2, 35, YELLOW, 20, true);
    
    let classMsg = "REALM SAVED.";
    if (pClass === "WARRIOR") classMsg = "WARRIOR: THE REALM IS SAFE BY YOUR SWORD.";
    else if (pClass === "SILENT") classMsg = "SILENT: THE SHADOWS EMBRACE THE QUIET VICTOR.";
    else if (pClass === "MAGE") classMsg = "MAGE: ANCIENT SECRETS ARE UNLOCKED IN THE VOID.";
    else if (pClass === "MERCHANT") classMsg = "MERCHANT: YOUR WEALTH HAS BOUGHT A NEW EMPIRE.";
    px(classMsg, W/2, 58, WHITE, 9, true);

    px("--- GAME STATS ---", W/2, 82, YELLOW, 11, true);
    px(`HP: ${pHP}/${pMaxHP}  |  GOLD: ${pGold}G  |  LOOP: ${currentLoop}`, W/2, 98, WHITE, 10, true);
    
    let totalBaseLv = Object.values(baseBuildings).reduce((a, b) => a + b, 0);
    px(`シェルター総施設レベル: Lv.${totalBaseLv}  /  累計資材: ${totalMaterialGained}M`, W/2, Math.round(114), WHITE, 10, true);
    px(`カード合成回数: ${totalSynthesisCount}回  |  総与ダメ: ${totalDamageDealt}`, W/2, Math.round(130), "#FFD700", 10, true);

    let activeRelicNames = [];
    Object.keys(pRelics).forEach(k => { if (pRelics[k] && RELIC_MASTER[k]) activeRelicNames.push(`[${RELIC_MASTER[k].name}]`); });
    px(`RELICS: ${activeRelicNames.join(" ") || "[NONE]"}`, W/2, Math.round(150), CYAN, 9, true);

    let cardSummary = {}; masterDeck.forEach(k => { let name = CARD_MASTER[k].name; cardSummary[name] = (cardSummary[name] || 0) + 1; });
    let deckText = Object.keys(cardSummary).map(name => `${name}x${cardSummary[name]}`).join(", ");
    if (deckText.length > 60) deckText = deckText.substring(0, 57) + "...";
    px(`DECK (${masterDeck.length} cards):`, W/2, Math.round(172), YELLOW, 9, true);
    px(deckText || "empty", W/2, Math.round(188), WHITE, 8, true);

    let isHoverDeep = (mx >= 60 && mx <= 230 && my >= 240 && my <= 280);
    let isHoverTitle = (mx >= 282 && mx <= 452 && my >= 240 && my <= 280);
    cx.fillStyle = isHoverDeep ? '#1a331a' : '#0d1a0d'; cx.fillRect(60, 240, 170, 40);
    cx.strokeStyle = GREEN; cx.strokeRect(60, 240, 170, 40);
    px("ENTER THE DEEP (LOOP +1)", 145, 264, WHITE, 9, true);
    px("(※基地施設・マテリアルを引き継ぎます)", 145, 276, '#88cc88', 7, true);

    cx.fillStyle = isHoverTitle ? '#331a1a' : '#1a0d0d'; cx.fillRect(282, 240, 170, 40);
    cx.strokeStyle = RED; cx.strokeRect(282, 240, 170, 40);
    px("RETURN TO TITLE", 367, 264, WHITE, 9, true);
  }

  if (gameState === "EVENT") {
    cx.fillStyle = 'rgba(15,10,20,0.96)'; cx.fillRect(0, 0, W, H);
    let isH1 = (mx >= 60 && mx <= 452 && my >= 150 && my <= 200);
    let isH2 = (mx >= 60 && mx <= 452 && my >= 220 && my <= 270);
    let isH3 = (mx >= 60 && mx <= 452 && my >= 290 && my <= 340);

    if (eventType === "altar") {
      px("REST ALTAR (休息の祭壇)", W/2, 60, YELLOW, 18, true);
      px("静かな祭壇を見つけた。どうする？", W/2, 100, WHITE, 11, true);
      cx.fillStyle = isH1 ? '#224' : '#141424'; cx.fillRect(60, 150, 392, 50);
      cx.strokeStyle = WHITE; cx.strokeRect(60, 150, 392, 50); px("1. 休息する (HP +20 回復)", 80, 180, WHITE, 11, false);
      cx.fillStyle = isH2 ? '#224' : '#141424'; cx.fillRect(60, 220, 392, 50);
      cx.strokeStyle = WHITE; cx.strokeRect(60, 220, 392, 50); px("2. 鍛冶を行う (ランダムカード1枚強化)", 80, 250, WHITE, 11, false);
      cx.fillStyle = isH3 ? '#224' : '#141424'; cx.fillRect(60, 290, 392, 50);
      cx.strokeStyle = WHITE; cx.strokeRect(60, 290, 392, 50); px("3. 祭壇を調べる (レリック獲得 / 呪い「後悔」獲得)", 80, 320, WHITE, 11, false);
    } else if (eventType === "fountain") {
      px("FOUNTAIN OF CHANGE (変化の泉)", W/2, 60, YELLOW, 18, true);
      px("不思議な光を放つ泉がある。どうする？", W/2, 100, WHITE, 11, true);
      cx.fillStyle = isH1 ? '#224' : '#141424'; cx.fillRect(60, 150, 392, 50);
      cx.strokeStyle = WHITE; cx.strokeRect(60, 150, 392, 50); px("1. 体を清める (すべてのSTRIKEを＋版にする)", 80, 180, WHITE, 11, false);
      cx.fillStyle = isH2 ? '#224' : '#141424'; cx.fillRect(60, 220, 392, 50);
      cx.strokeStyle = WHITE; cx.strokeRect(60, 220, 392, 50); px("2. 泉に手を入れる (ランダムカード1枚を別カードに変化)", 80, 250, WHITE, 11, false);
      cx.fillStyle = isH3 ? '#224' : '#141424'; cx.fillRect(60, 290, 392, 50);
      cx.strokeStyle = WHITE; cx.strokeRect(60, 290, 392, 50); px("3. 立ち去る (何も起きない)", 80, 320, WHITE, 11, false);
    }
  }

  for(let i=dmgPopups.length-1; i>=0; i--){
    let p = dmgPopups[i]; px(p.text, p.x, p.y, p.col, 12, true); p.y -= 0.6; p.frames--;
    if(p.frames <= 0) dmgPopups.splice(i, 1);
  }

  if (flashFrame > 0) { cx.fillStyle = `rgba(216,40,0,${flashFrame * 0.08})`; cx.fillRect(0,0,W,H); flashFrame--; }

  if (activeTooltip && activeTooltip.name && activeTooltip.desc) {
    cx.save(); let tx = mx + 12; let ty = my + 12;
    cx.font = "bold 10px monospace"; let titleW = cx.measureText(activeTooltip.name).width;
    let descLines = []; let rawDesc = activeTooltip.desc;
    for (let j = 0; j < rawDesc.length; j += 32) descLines.push(rawDesc.substring(j, j + 32));
    cx.font = "bold 9px monospace"; let maxDescW = 0;
    descLines.forEach(l => { let lw = cx.measureText(l).width; if (lw > maxDescW) maxDescW = lw; });
    let tw = Math.max(titleW, maxDescW) + 16; let th = 18 + (descLines.length * 11);
    if (tx + tw > W) tx = mx - tw - 4; if (ty + th > H) ty = my - th - 4;
    cx.fillStyle = "rgba(10, 10, 20, 0.95)"; cx.fillRect(tx, ty, tw, th);
    cx.strokeStyle = WHITE; cx.lineWidth = 1; cx.strokeRect(tx, ty, tw, th);
    px(activeTooltip.name, tx + 8, ty + 14, YELLOW, 10, false);
    descLines.forEach((l, idx) => { px(l, tx + 8, ty + 25 + (idx * 11), WHITE, 9, false); });
    cx.restore();
  }
}
function drawCRT() {
  cx.save(); cx.globalAlpha = 0.03; cx.fillStyle = '#000';
  for (let y = 0; y < H; y += 2) cx.fillRect(0, y, W, 1); cx.restore();
}

</script>
</body>
