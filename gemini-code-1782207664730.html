function getAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}

function beep(freq,dur,type='square',vol=0.1,delay=0){
  try{
    const a=getAudio(),o=a.createOscillator(),g=a.createGain();
    o.connect(g);g.connect(a.destination);
    o.type=type;o.frequency.value=freq;
    g.gain.setValueAtTime(vol,a.currentTime+delay);
    g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+delay+dur);
    o.start(a.currentTime+delay);o.stop(a.currentTime+delay+dur+0.01);
  }catch(e){}
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function decideEnemyIntent() {
  eTurnCount++;
  if (eType === "goblin") {
    if (eTurnCount % 3 === 0) eIntent = { action: "ATTACK", type: "⚔️", name: "SHARP CLAW", value: 4, poison: 1, frail: 1 };
    else eIntent = { action: "ATTACK", type: "⚔️", name: "RUSH", value: 5 };
  } else if (eType === "slime") {
    if (eHP <= (eMaxHP / 2) && !activeMeldingTriggered) {
      activeMeldingTriggered = true;
      eIntent = { action: "DEFEND", type: "🧬", name: "MELDING", value: 0 };
    } else {
      if (eTurnCount % 2 === 1) eIntent = { action: "DEFEND", type: "🛡️", name: "SLIME SHIELD", value: 8 };
      else eIntent = { action: "ATTACK", type: "⚔️", name: "TACKLE", value: 6 };
    }
  } else if (eType === "orc") {
    let orcRage = Math.max(0, eTurnCount - 3) * 2;
    if (orcRage > 0 && eTurnCount === 4) dmgPopups.push({ text: `ORC ENRAGED! ATK+${orcRage}`, x: 380, y: 100, col: RED, frames: 50 });
    if (eTurnCount % 3 === 0) eIntent = { action: "ATTACK", type: "💥", name: "HEAVY SMASH", value: 16 + orcRage };
    else if (eTurnCount % 3 === 1) eIntent = { action: "ATTACK", type: "📣", name: "CHALLENGE", value: 0 };
    else eIntent = { action: "DEFEND", type: "🛡️", name: "BRACE", value: 6 };
  } else if (eType === "mage") {
    if (eTurnCount % 3 === 1) eIntent = { action: "ATTACK", type: "🔮", name: "FIRE BOLT", value: 12 };
    else if (eTurnCount % 3 === 2) eIntent = { action: "ATTACK", type: "⚠️", name: "SPOIL", value: 0 };
    else eIntent = { action: "ATTACK", type: "💀", name: "ARCANE CURSE", value: 4, vuln: 2 };
  } else if (eType === "dragon") {
    let isPhase2 = eHP <= (eMaxHP / 2);
    if (eTurnCount % 3 === 1) eIntent = { action: "ATTACK", type: "🔥", name: isPhase2 ? "HELLFIRE" : "DRAGON BREATH", value: isPhase2 ? 24 : 16, poison: isPhase2 ? 3 : 0 };
    else if (eTurnCount % 3 === 2) eIntent = { action: "DEFEND", type: "🛡️", name: "SCALE GUARD", value: isPhase2 ? 8 : 14 };
    else eIntent = { action: "ATTACK", type: "⚔️", name: isPhase2 ? "VENOM BITE" : "BITE", value: 10, poison: isPhase2 ? 2 : 0 };
  }
  // DRAGON ANCIENT POWER: フェーズ2で毎ターンATK+3
  if (eType === "dragon" && ePhase2Triggered && ePhase2Gimmick === "ancient_power" && eIntent.action === "ATTACK") {
    let powerStacks = Math.max(0, eTurnCount - 3) * 3;
    eIntent.value += powerStacks;
    if (powerStacks > 0) dmgPopups.push({ text: `ANCIENT POWER +${powerStacks}`, x: 380, y: 95, col: PURPLE, frames: 35 });
  }
}

function startPlayerTurn() {
  if (pPoison > 0) {
    pHP = Math.max(1, pHP - pPoison);
    dmgPopups.push({ text: `POISON -${pPoison}`, x: 100, y: 140, col: GREEN, frames: 35 });
    pPoison--;
  }

  let maxEnergyBonus = pMaxEnergy + (pRelics.greenGem ? 1 : 0) + nextTurnEnergyMod;
  pEnergy = Math.max(0, maxEnergyBonus);
  nextTurnEnergyMod = 0; 

  // ドラゴンフェーズ2ギミック効果
  if (ePhase2Triggered && eType === "dragon") {
    if (ePhase2Gimmick === "flame_aura") {
      pBlock = Math.floor(pBlock / 2);
      if (pBlock > 0) dmgPopups.push({ text: "🔥FLAME AURA: BLK HALVED", x: 100, y: 100, col: RED, frames: 30 });
    }
  }

  pBlock = (pRelics.blueGem ? 3 : 0) + nextTurnBlock;
  if(pRelics.blueGem) {
    dmgPopups.push({ text: "GEM SHIELD +3", x: 100, y: 120, col: CYAN, frames: 30 });
  }
  if (nextTurnBlock > 0) {
    dmgPopups.push({ text: `DODGE BLOCK +${nextTurnBlock}`, x: 100, y: 135, col: CYAN, frames: 30 });
    nextTurnBlock = 0;
  }

  turnAtkCount = 0;
  turnDefCount = 0;
  isFirstAtkInTurn = true;
  pReflect = 0; 
  activeOrcChallenge = false; 

  gameState = "BATTLE";
  decideEnemyIntent();
  
  hand = [];
  handCostMods = [];
  if (isFirstTurnOfCombat) {
    isFirstTurnOfCombat = false;
    for (let i = deck.length - 1; i >= 0; i--) {
      let cKey = deck[i];
      if (CARD_MASTER[cKey] && CARD_MASTER[cKey].innate) {
        hand.push(cKey);
        handCostMods.push(0);
        deck.splice(i, 1);
        if (hand.length >= 10) break;
      }
    }
    if (hand.length < 5) {
      drawCards(5 - hand.length);
    }
  } else {
    drawCards(5);
  }

  if(activeInfiniteBladesCount > 0) {
    for(let k=0; k<activeInfiniteBladesCount; k++) {
      if(hand.length < 10) {
        hand.push("shiv");
        handCostMods.push(0);
        dmgPopups.push({ text: "SHIV GENERATED", x: 256, y: 300, col: WHITE, frames: 25 });
      }
    }
  }
}

function drawCards(num) {
  for (let i = 0; i < num; i++) {
    if (hand.length >= 10) break;
    if (deck.length === 0) {
      triggerDiscardBlockLogic(discard.length); 
      deck = [...discard]; discard = []; shuffle(deck);
    }
    if (deck.length > 0) {
      hand.push(deck.pop());
      handCostMods.push(0);
    }
  }
  sfxDraw();
}

function triggerDiscardBlockLogic(amount) {
  if (activeIronSkinCount > 0 && amount > 0) {
    let ironBlock = activeIronSkinCount * 3;
    pBlock += ironBlock;
    dmgPopups.push({ text: `IRON SKIN +${ironBlock}`, x: 100, y: 110, col: CYAN, frames: 35 });
  }
}

function triggerExhaustLogic() {
  if(activeDarkEmbraceCount > 0) {
    drawCards(activeDarkEmbraceCount);
    dmgPopups.push({ text: "DARK EMBRACE DRAW", x: 100, y: 90, col: PURPLE, frames: 35 });
  }
  if(activeFeelNoPainCount > 0) {
    pBlock += activeFeelNoPainCount;
    dmgPopups.push({ text: `FEEL NO PAIN +${activeFeelNoPainCount}`, x: 100, y: 110, col: CYAN, frames: 35 });
  }
}

function runEnemyTurn() {
  gameState = "ENEMY_TURN";
  sfxTurnEnd();
  
  if (pWeak > 0) pWeak--;
  if (pVuln > 0) pVuln--;
  if (pFrail > 0) pFrail--;

  // 呪いカード処理
  let regretCount = hand.filter(k => k === "regret").length;
  if (regretCount > 0) {
    let regretDmg = regretCount * 2;
    pHP = Math.max(0, pHP - regretDmg);
    dmgPopups.push({ text: `REGRET -${regretDmg} HP`, x: 100, y: 150, col: RED, frames: 40 });
    if (pHP <= 0) { gameState = "GAMEOVER"; return; }
  }
  let decayCount = hand.filter(k => k === "decay").length;
  if (decayCount > 0) {
    let decayDmg = decayCount * 3;
    pHP = Math.max(0, pHP - decayDmg);
    dmgPopups.push({ text: `DECAY -${decayDmg} HP`, x: 100, y: 135, col: RED, frames: 40 });
    if (pHP <= 0) { gameState = "GAMEOVER"; return; }
  }
  let burnCount = hand.filter(k => k === "burn").length;
  if (burnCount > 0) {
    let burnDmg = burnCount * 1;
    pHP = Math.max(0, pHP - burnDmg);
    dmgPopups.push({ text: `BURN -${burnDmg} HP`, x: 100, y: 120, col: RED, frames: 40 });
    if (pHP <= 0) { gameState = "GAMEOVER"; return; }
  }

  let retained = [];
  let toDiscard = [];
  hand.forEach(cKey => {
    if (CARD_MASTER[cKey] && CARD_MASTER[cKey].retain) {
      retained.push(cKey);
    } else {
      toDiscard.push(cKey);
    }
  });

  triggerDiscardBlockLogic(toDiscard.length);
  discard.push(...toDiscard);
  hand = [...retained];

  setTimeout(() => {
    if (activeCombustCount > 0 && eHP > 0) {
      eHP -= activeCombustCount;
      enemyShakeFrame = 6;
      dmgPopups.push({ text: `COMBUST -${activeCombustCount}`, x: 380, y: 150, col: RED, frames: 35 });
      if (eHP <= 0) { eHP = 0; triggerEnemyDeathAnim(); return; }
    }

    if (ePoison > 0) {
      eHP -= ePoison;
      enemyShakeFrame = 10; 
      dmgPopups.push({ text: `POISON -${ePoison}`, x: 380, y: 140, col: GREEN, frames: 35 });
      ePoison--;
      if (eHP <= 0) { eHP = 0; triggerEnemyDeathAnim(); return; }
    }

    sfxEnemy();
    let baseEValue = eIntent.value;
    if (eWeak > 0) baseEValue = Math.floor(baseEValue * 0.5);

    if (eIntent.action === "ATTACK") {
      let dmg = baseEValue;
      if (pVuln > 0) dmg = Math.floor(dmg * 1.5);

      if (pBlock >= dmg) {
        pBlock -= dmg;
        dmgPopups.push({ text: "BLOCKED", x: 100, y: 160, col: "#00c8d0", frames: 35 });
      } else {
        dmg -= pBlock; pBlock = 0; pHP -= dmg;
        dmgPopups.push({ text: `-${dmg}`, x: 100, y: 160, col: '#d82800', frames: 35 });
        flashFrame = 6;
      }

      if(pReflect > 0 && eHP > 0) {
        eHP -= pReflect;
        dmgPopups.push({ text: `BARRIER REFLECT -${pReflect}`, x: 380, y: 160, col: RED, frames: 35 });
        if (eHP <= 0) { eHP = 0; triggerEnemyDeathAnim(); return; }
      }
      if (eIntent.poison) {
        pPoison += eIntent.poison;
        dmgPopups.push({ text: `POISONED +${eIntent.poison}`, x: 100, y: 180, col: GREEN, frames: 35 });
      }
      if (eIntent.vuln) {
        pVuln += eIntent.vuln;
        dmgPopups.push({ text: `VULNERABLE +${eIntent.vuln}`, x: 100, y: 195, col: YELLOW, frames: 35 });
      }
      if (eIntent.frail) {
        pFrail += eIntent.frail;
        dmgPopups.push({ text: `FRAIL +${eIntent.frail}`, x: 100, y: 195, col: YELLOW, frames: 35 });
      }
      // MAGEのARCANE CURSEでBURNカードを山札に挿入
      if (eType === "mage" && eIntent.name === "ARCANE CURSE") {
        deck.push("burn");
        shuffle(deck);
        dmgPopups.push({ text: "🔥BURN ADDED TO DECK", x: 256, y: 220, col: RED, frames: 50 });
      }
      // MAGEのSPOILで手札にWOUNDカードを挿入
      if (eType === "mage" && eIntent.name === "SPOIL") {
        if (hand.length < 10) { hand.push("wound"); handCostMods.push(0); }
        if (hand.length < 10) { hand.push("wound"); handCostMods.push(0); }
        dmgPopups.push({ text: "⚠️ SPOILED: WOUND x2 ADDED", x: 256, y: 220, col: GRAY, frames: 50 });
      }
      // ORCのCHALLENGE効果発動
      if (eType === "orc" && eIntent.name === "CHALLENGE") {
        activeOrcChallenge = true;
        dmgPopups.push({ text: "🛡️ CHALLENGED: ATK GIVES BLOCK", x: 256, y: 220, col: RED, frames: 55 });
      }
      // DRAGONフェーズ移行チェック
      if (eType === "dragon" && eHP <= (eMaxHP / 2) && !ePhase2Triggered) {
        ePhase2Triggered = true;
        let gimmicks = ["flame_aura", "curse_energy", "ancient_power"];
        ePhase2Gimmick = gimmicks[Math.floor(Math.random() * gimmicks.length)];
        flashFrame = 20;
        dmgPopups.push({ text: "🐲 THE DRAGON ROARS! 🐲", x: 256, y: 170, col: YELLOW, frames: 70 });
        dmgPopups.push({ text: "PHASE 2 ACTIVATED", x: 256, y: 190, col: RED, frames: 60 });
        let gimmickText = ePhase2Gimmick === "flame_aura" ? "🔥FLAME AURA: BLOCK HALVED" :
                          ePhase2Gimmick === "curse_energy" ? "💠CURSE: MAX ENERGY -1" :
                          "🐲ANCIENT POWER: ATK+3/TURN";
        dmgPopups.push({ text: gimmickText, x: 256, y: 210, col: PURPLE, frames: 80 });
        deck.push("wound"); deck.push("wound");
        shuffle(deck);
        dmgPopups.push({ text: "WOUND x2 ADDED TO DECK", x: 256, y: 240, col: GRAY, frames: 50 });
        if (ePhase2Gimmick === "curse_energy") {
          pMaxEnergy = Math.max(1, pMaxEnergy - 1);
        }
        beep(80, 0.5, 'sawtooth', 0.3); beep(60, 0.4, 'sawtooth', 0.25, 0.15);
      }

    } else if (eIntent.action === "DEFEND") {
      if (eIntent.name === "MELDING") {
        eHP = Math.min(eMaxHP, eHP + 15);
        ePoison = 0;
        eWeak = eVuln = 0;
        dmgPopups.push({ text: "MELDING: +15 HP & CURED", x: 380, y: 160, col: GREEN, frames: 45 });
      } else {
        eBlock += baseEValue;
        dmgPopups.push({ text: `+${baseEValue} BLOCK`, x: 380, y: 160, col: "#00c8d0", frames: 35 });
      }
    }

    setTimeout(() => {
      if (pHP <= 0) { pHP = 0; gameState = "GAMEOVER"; }
      else { eBlock = 0; startPlayerTurn(); }
    }, 500);
  }, 600);
}

function handleEnemyDeathFinal() {

function generateRewardOptions() {
  gameState = "REWARD";
  sfxWin();

    let rK = allKeys[Math.floor(Math.random() * allKeys.length)];

  }

}

function generateShopInventory() {
  gameState = "SHOP";
  shopInventory = [];
  const keys = Object.keys(CARD_MASTER).filter(k => k !== "shiv" && k !== "regret" && k !== "decay" && k !== "wound" && k !== "burn");
  
  for(let i=0; i<2; i++) {
    let rKey = keys[Math.floor(Math.random() * keys.length)];
    let rarityPrice = CARD_MASTER[rKey].rare === "RARE" ? 35 : 20;
    shopInventory.push({ type: "CARD", cardKey: rKey, cost: rarityPrice, bought: false });

    shopInventory.push({ type: "RELIC", relicKey: rRelic, cost: RELIC_MASTER[rRelic].cost, bought: false });

  shopInventory.push({ type: "REMOVE", cost: 25, bought: false });

    currentFloor++;
    if (currentFloor === 2) {
      gameState = "EVENT";
      eventType = Math.random() < 0.5 ? "altar" : "fountain";
    } else if (currentFloor === 4) {
      gameState = "EVENT";
      eventType = Math.random() < 0.5 ? "merchant" : "mimic";
    } else {
      initFloor();
    }
  }
}


function calculatePredictedDamage(cData) {
  let baseDmg = cData.value;
  let playerFinalPowerBonus = pPower + (pRelics.redGem ? 2 : 0);
  
  baseDmg += activeAccuracyBonus;
  
  if (cData.isShieldBash) baseDmg = Math.floor(pBlock * (cData.valueFactor || 0.7));
  else if (cData.isExecute && eHP <= (eMaxHP / 2)) baseDmg = 20;
  else if (cData.isFortress) baseDmg = cData.value + Math.floor(pBlock * 0.5) + activeAccuracyBonus;
  else if (cData.isToxicDmg) baseDmg = cData.value + (ePoison * 3) + activeAccuracyBonus;
  else if (cData.isBarrierBlast) baseDmg = cData.value + pBlock + activeAccuracyBonus;
  else if (cData.isBodySlam) baseDmg = pBlock;
  else if (cData.isShieldSlam) baseDmg = pBlock * (cData.factor || 2);
  else if (cData.strengthSynergy) baseDmg = cData.value + playerFinalPowerBonus + activeAccuracyBonus;
  else if (cData.risky || cData.isOffering) baseDmg = 12 + activeAccuracyBonus;

  let finalVal = baseDmg;
  if (pWeak > 0) finalVal = Math.floor(finalVal * 0.5);
  finalVal += playerFinalPowerBonus;
  if (eVuln > 0) finalVal = Math.floor(finalVal * 1.5);
  
  return finalVal;
}

const BG = '#0a0a14', WHITE = '#e8e8e0', GRAY = '#505060', YELLOW = '#f0d000';
const RED = '#d82800', BLUE = '#0088ff', CYAN = '#00c8d0', GREEN = '#1a8a1a', PURPLE = '#b040ff';

function px(t, x, y, col, sz, center) {
  cx.fillStyle = col; 
  let finalSz = Math.round(sz * 1.15);
  cx.font = `bold ${finalSz}px monospace`;
  cx.letterSpacing = sz < 10 ? "0.2px" : "1.5px";
  if (center) { const w = cx.measureText(t).width; cx.fillText(t, x - w / 2, y); }
  else { cx.fillText(t, x, y); }
}

function drawCardIcon(type, x, y) {
  cx.save();
  if (type === "ATK") {
    cx.fillStyle = WHITE; cx.fillRect(x+2, y, 2, 8); cx.fillRect(x, y+2, 6, 2);
    cx.fillStyle = RED; cx.fillRect(x+2, y+8, 2, 2);    
  } else if (type === "DEF") {
    cx.fillStyle = CYAN; cx.fillRect(x, y, 8, 2); cx.fillRect(x, y+2, 8, 5);
    cx.beginPath(); cx.moveTo(x, y+7); cx.lineTo(x+4, y+10); cx.lineTo(x+8, y+7); cx.closePath(); cx.fill();
  } else if (type === "DRW" || type === "POW") {
    cx.fillStyle = PURPLE; cx.fillRect(x, y, 8, 8);
    cx.fillStyle = WHITE; cx.fillRect(x+1, y+2, 6, 1); cx.fillRect(x+1, y+5, 6, 1);
  } else if (type === "HEAL") {
    cx.fillStyle = GREEN; cx.fillRect(x+3, y, 3, 9); cx.fillRect(x, y+3, 9, 3);
  }
  cx.restore();
}

function drawEnemySprite(type, x, y) {
  cx.save();
  if (gameState === "DEATH_ANIM") {

      cx.restore();
      return; 
    }

    cx.fillStyle = '#d80'; cx.beginPath(); cx.moveTo(x, y-38); cx.lineTo(x-14, y-24); cx.lineTo(x+14, y-24); cx.closePath(); cx.fill();

    cx.fillStyle = '#000'; cx.fillRect(x-6, y-38, 3, 4); cx.fillRect(x+3, y-38, 3, 4);

function drawStatusIcons(x, y, poison, weak, vuln, thorns, frail, alignCenter) {
  let spacing = 38;
  let list = [];
  if (poison > 0) list.push({ key: "POIS", icon: "🤢", label: `${poison}`, sub: "POIS" });
  if (weak > 0)   list.push({ key: "WEAK", icon: "💤", label: `${weak}`,   sub: "-50%" });
  if (vuln > 0)   list.push({ key: "VULN", icon: "💔", label: `${vuln}`,   sub: "+50%" });
  if (thorns > 0) list.push({ key: "THORNS", icon: "🌵", label: `${thorns}`, sub: "THRN" });
  if (frail > 0)  list.push({ key: "FRAIL", icon: "🩹", label: `${frail}`,  sub: "BLK-50%" });
  if (pReflect > 0 && !alignCenter) list.push({ key: "REFL", icon: "🔥", label: `${pReflect}`, sub: "REFL" });

  let currentX = x;
  if (alignCenter) {
    currentX = x - (list.length * spacing) / 2 + spacing / 2;
  }

  list.forEach(item => {
    px(`${item.icon}${item.label}`, currentX, y, GREEN, 11, true);
    px(item.sub, currentX, y + 11, '#ffa0a0', 7, true);
    
    // マウスホバー判定 (アイコン領域内にあるかチェック)
    if (mx >= currentX - 15 && mx <= currentX + 15 && my >= y && my <= y + 20) {
      activeTooltip = STATUS_DESCS[item.key];
    }
    
    currentX += spacing;
  });
}

// 手札の「描画座標の計算」を一元管理してズレを完全解消
function getCardGeometry(handLength, index) {
  let cardW = 74, cardH = 110, startY = 336, gap = 6;
  if (handLength > 6) {
    cardW = Math.max(48, 74 - (handLength - 6) * 4);
    gap = Math.max(1, 6 - (handLength - 6) * 0.8);
  }
  const totalW = handLength * cardW + (handLength - 1) * gap;
  const startX = (W - totalW) / 2;
  let cxPos = startX + index * (cardW + gap);
  return { x: cxPos, y: startY, w: cardW, h: cardH };
}

      let sX = 18 + i * (sW + gap);
      let isHover = (mx >= sX && mx <= sX + sW && my >= sY && my <= sY + sH) && !item.bought;

      cx.fillStyle = item.bought ? '#222' : (isHover ? '#332211' : '#17130e');
      cx.fillRect(sX, sY, sW, sH);
      cx.strokeStyle = item.bought ? GRAY : (isHover ? YELLOW : WHITE);
      cx.strokeRect(sX, sY, sW, sH);

      if (!item.bought) {
        if (item.type === "REMOVE") {
          px("REMOVE", sX + sW/2, sY + 30, RED, 11, true);
          px("CARD", sX + sW/2, sY + 45, RED, 11, true);
          px("PERMANENT", sX + sW/2, sY + 80, WHITE, 8, true);
          px("DELETE", sX + sW/2, sY + 95, WHITE, 8, true);
        } else if (item.type === "POTION") {
          px("POTION", sX + sW/2, sY + 35, GREEN, 11, true);
          px("HEAL HP", sX + sW/2, sY + 75, WHITE, 8, true);
          px("+20 VALUE", sX + sW/2, sY + 92, GREEN, 8, true);
        } else if (item.type === "RELIC") {
          let rData = RELIC_MASTER[item.relicKey];
          px("★RELIC★", sX + sW/2, sY + 25, YELLOW, 9, true);
          px(rData.name, sX + sW/2, sY + 45, CYAN, 8, true);
          px(rData.desc.split(" ")[0], sX + sW/2, sY + 80, '#ccc', 7, true);
          px(rData.desc.split(" ").slice(1).join(" "), sX + sW/2, sY + 92, '#ccc', 7, true);
        } else if (item.type === "CARD") {
          let cData = CARD_MASTER[item.cardKey];
          px(cData.name, sX + sW/2, sY + 35, cData.rare==="RARE"?PURPLE:WHITE, cData.name.length>8?6:9, true);
          px(`[${cData.type}]`, sX + sW/2, sY + 55, cData.type==="ATK"?RED:CYAN, 8, true);
          px(cData.desc, sX + sW/2, sY + 90, '#aaa', 6, true);
        }
        px(`${item.cost}G`, sX + sW/2, sY + 132, YELLOW, 11, true);
      } else {
        px("SOLD OUT", sX + sW/2, sY + 75, GRAY, 11, true);
      }
    }

    let isLeaveHover = (mx >= 206 && mx <= 306 && my >= 330 && my <= 360);
    cx.fillStyle = isLeaveHover ? '#444' : '#222'; cx.fillRect(206, 330, 100, 30);
    cx.strokeStyle = WHITE; cx.strokeRect(206, 330, 100, 30);
    px("LEAVE SHOP", 256, 349, WHITE, 11, true);
  }

  if (gameState === "SHOP_REMOVE") {
    cx.fillStyle = 'rgba(10,0,0,0.95)'; cx.fillRect(0, 0, W, H);
    px("SELECT 1 CARD TO DISCARD FOREVER", W/2, 45, RED, 14, true);
    
    let startX = 46, startY = 90;
    for(let i=0; i<masterDeck.length; i++) {
      let rX = startX + (i % 5) * 84;
      let rY = startY + Math.floor(i / 5) * 50;
      let isHover = (mx >= rX && mx <= rX + 76 && my >= rY && my <= rY + 40);
      cx.fillStyle = isHover ? '#400' : '#1c1c1c'; cx.fillRect(rX, rY, 76, 40);
      cx.strokeStyle = isHover ? YELLOW : GRAY; cx.strokeRect(rX, rY, 76, 40);
      
      let cData = CARD_MASTER[masterDeck[i]];
      px(cData.name, rX + 38, rY + 20, cData.rare==="RARE"?PURPLE:WHITE, cData.name.length>8?6:9, true);
      px(`[${cData.type}]`, rX + 38, rY + 32, GRAY, 7, true);
    }
  }

  if (gameState === "GAMEOVER") {
    cx.fillStyle = 'rgba(0,0,0,0.85)'; cx.fillRect(0, 0, W, H);
    px("YOU DIED", W/2, H/2 - 20, RED, 26, true); px("CLICK TO RESTART", W/2, H/2 + 20, WHITE, 12, true);
  }

  if (gameState === "ENDING") {
    cx.fillStyle = 'rgba(5,15,10,0.97)'; cx.fillRect(0, 0, W, H);
    px("👑 CONGRATULATIONS! 👑", W/2, 60, YELLOW, 20, true);
    
    let classMsg = "REALM SAVED.";
    if (pClass === "WARRIOR") classMsg = "THE MIGHTY WARRIOR SLAIN THE DRAGON!";
    else if (pClass === "SILENT") classMsg = "THE SILENT VANISHED INTO THE SHADOWS.";
    else if (pClass === "MAGE") classMsg = "THE WISE MAGE UNLOCKED THE ARCANE SECRETS.";
    px(classMsg, W/2, 90, WHITE, 11, true);

    // 統計情報の描画
    px("--- GAME STATS ---", W/2, 130, YELLOW, 11, true);
    px(`HP: ${pHP}/${pMaxHP}   /   GOLD: ${pGold}G   /   LEVEL: ${pLv}`, W/2, 155, WHITE, 10, true);

    // 所持レリックの表示
    let activeRelicNames = [];
    Object.keys(pRelics).forEach(k => {
      if (pRelics[k] && RELIC_MASTER[k]) {
        activeRelicNames.push(`[${RELIC_MASTER[k].name}]`);
      }
    });
    let relicDisplay = activeRelicNames.join(" ") || "[NONE]";
    px(`RELICS: ${relicDisplay}`, W/2, 185, CYAN, 9, true);

    // デッキの要約表示
    let cardSummary = {};
    masterDeck.forEach(k => {
      let name = CARD_MASTER[k].name;
      cardSummary[name] = (cardSummary[name] || 0) + 1;
    });
    let deckText = Object.keys(cardSummary).map(name => `${name}x${cardSummary[name]}`).join(", ");
    if (deckText.length > 60) deckText = deckText.substring(0, 57) + "...";
    px(`DECK (${masterDeck.length} cards):`, W/2, 215, YELLOW, 9, true);
    px(deckText || "empty", W/2, 235, WHITE, 8, true);

    px("- CLICK TO TITLE PLAY AGAIN -", W/2, 280, CYAN, 10, true);
  }

  // イベント画面
  if (gameState === "EVENT") {
    cx.fillStyle = 'rgba(15,10,20,0.96)'; cx.fillRect(0, 0, W, H);
    
    let isH1 = (mx >= 60 && mx <= 452 && my >= 150 && my <= 200);
    let isH2 = (mx >= 60 && mx <= 452 && my >= 220 && my <= 270);
    let isH3 = (mx >= 60 && mx <= 452 && my >= 290 && my <= 340);

    if (eventType === "altar") {
      px("REST ALTAR (休息の祭壇)", W/2, 60, YELLOW, 18, true);
      px("静かな祭壇を見つけた。どうする？", W/2, 100, WHITE, 11, true);

      cx.fillStyle = isH1 ? '#224' : '#141424'; cx.fillRect(60, 150, 392, 50);
      cx.strokeStyle = WHITE; cx.strokeRect(60, 150, 392, 50);
      px("1. 休息する (HP +20 回復)", 80, 180, WHITE, 11, false);

      cx.fillStyle = isH2 ? '#224' : '#141424'; cx.fillRect(60, 220, 392, 50);
      cx.strokeStyle = WHITE; cx.strokeRect(60, 220, 392, 50);
      px("2. 鍛冶を行う (ランダムカード1枚強化)", 80, 250, WHITE, 11, false);

      cx.fillStyle = isH3 ? '#224' : '#141424'; cx.fillRect(60, 290, 392, 50);
      cx.strokeStyle = WHITE; cx.strokeRect(60, 290, 392, 50);
      px("3. 祭壇を調べる (レリック獲得 / 呪い「後悔」獲得)", 80, 320, WHITE, 11, false);
    } else if (eventType === "fountain") {
      px("FOUNTAIN OF CHANGE (変化の泉)", W/2, 60, YELLOW, 18, true);
      px("不思議な光を放つ泉がある。どうする？", W/2, 100, WHITE, 11, true);

      cx.fillStyle = isH1 ? '#224' : '#141424'; cx.fillRect(60, 150, 392, 50);
      cx.strokeStyle = WHITE; cx.strokeRect(60, 150, 392, 50);
      px("1. 体を清める (すべてのSTRIKEを＋版にする)", 80, 180, WHITE, 11, false);

      cx.fillStyle = isH2 ? '#224' : '#141424'; cx.fillRect(60, 220, 392, 50);
      cx.strokeStyle = WHITE; cx.strokeRect(60, 220, 392, 50);
      px("2. 泉に手を入れる (ランダムカード1枚を別カードに変化)", 80, 250, WHITE, 11, false);

      cx.fillStyle = isH3 ? '#224' : '#141424'; cx.fillRect(60, 290, 392, 50);
      cx.strokeStyle = WHITE; cx.strokeRect(60, 290, 392, 50);
      px("3. 立ち去る (何も起きない)", 80, 320, WHITE, 11, false);
    } else if (eventType === "merchant") {
      px("DARK MERCHANT (闇の商人)", W/2, 60, YELLOW, 18, true);
      px("怪しい商人が声をかけてきた。どうする？", W/2, 100, WHITE, 11, true);

      cx.fillStyle = isH1 ? '#224' : '#141424'; cx.fillRect(60, 150, 392, 50);
      cx.strokeStyle = WHITE; cx.strokeRect(60, 150, 392, 50);
      px("1. 魂を売る (ゴールド +80G / 呪い「腐敗」獲得)", 80, 180, WHITE, 11, false);

      cx.fillStyle = isH2 ? '#224' : '#141424'; cx.fillRect(60, 220, 392, 50);
      cx.strokeStyle = WHITE; cx.strokeRect(60, 220, 392, 50);
      px("2. カードを処分する (ランダムカード1枚削除)", 80, 250, WHITE, 11, false);

      cx.fillStyle = isH3 ? '#224' : '#141424'; cx.fillRect(60, 290, 392, 50);
      cx.strokeStyle = WHITE; cx.strokeRect(60, 290, 392, 50);
      px("3. 無視して立ち去る (何も起きない)", 80, 320, WHITE, 11, false);
    } else if (eventType === "mimic") {
      px("MIMIC CHEST (宝箱の罠)", W/2, 60, YELLOW, 18, true);
      px("きらびやかな宝箱が置いてある。どうする？", W/2, 100, WHITE, 11, true);

      cx.fillStyle = isH1 ? '#224' : '#141424'; cx.fillRect(60, 150, 392, 50);
      cx.strokeStyle = WHITE; cx.strokeRect(60, 150, 392, 50);
      px("1. 宝箱を開ける (レリック獲得 / 50%で20HPダメージ)", 80, 180, WHITE, 11, false);

      cx.fillStyle = isH2 ? '#224' : '#141424'; cx.fillRect(60, 220, 392, 50);
      cx.strokeStyle = WHITE; cx.strokeRect(60, 220, 392, 50);
      px("2. 罠を解除する (25G消費してレリック獲得)", 80, 250, WHITE, 11, false);

      cx.fillStyle = isH3 ? '#224' : '#141424'; cx.fillRect(60, 290, 392, 50);
      cx.strokeStyle = WHITE; cx.strokeRect(60, 290, 392, 50);
      px("3. 安全に立ち去る (何も起きない)", 80, 320, WHITE, 11, false);
    }
  }

  for(let i=dmgPopups.length-1; i>=0; i--){
    let p = dmgPopups[i];
    px(p.text, p.x, p.y, p.col, 12, true);
    p.y -= 0.6; 
    p.frames--;
    if(p.frames <= 0) dmgPopups.splice(i, 1);
  }

  if (flashFrame > 0) { cx.fillStyle = `rgba(216,40,0,${flashFrame * 0.08})`; cx.fillRect(0,0,W,H); flashFrame--; }

  // ツールチップ描画
  if (activeTooltip && activeTooltip.name && activeTooltip.desc) {
    cx.save();
    let tx = mx + 12;
    let ty = my + 12;
    
    // テキストサイズ計測と枠の寸法算出
    cx.font = "bold 10px monospace";
    let titleW = cx.measureText(activeTooltip.name).width;
    
    // 長い説明文を折り返す処理 (40文字ごとに分割)
    let descLines = [];
    let rawDesc = activeTooltip.desc;
    for (let j = 0; j < rawDesc.length; j += 32) {
      descLines.push(rawDesc.substring(j, j + 32));
    }
    
    cx.font = "bold 9px monospace";
    let maxDescW = 0;
    descLines.forEach(l => {
      let lw = cx.measureText(l).width;
      if (lw > maxDescW) maxDescW = lw;
    });
    
    let tw = Math.max(titleW, maxDescW) + 16;
    let th = 18 + (descLines.length * 11);

    // 画面外はみ出し防止
    if (tx + tw > W) tx = mx - tw - 4;
    if (ty + th > H) ty = my - th - 4;

    cx.fillStyle = "rgba(10, 10, 20, 0.95)";
    cx.fillRect(tx, ty, tw, th);
    cx.strokeStyle = WHITE;
    cx.lineWidth = 1;
    cx.strokeRect(tx, ty, tw, th);

    px(activeTooltip.name, tx + 8, ty + 14, YELLOW, 10, false);
    descLines.forEach((l, idx) => {
      px(l, tx + 8, ty + 25 + (idx * 11), WHITE, 9, false);
    });
    cx.restore();
  }
}

function drawCRT() {
  cx.save(); cx.globalAlpha = 0.03; cx.fillStyle = '#000';
  for (let y = 0; y < H; y += 2) cx.fillRect(0, y, W, 1); cx.restore();
}

// ==================== コアカード効果処理ルーチン ====================
function executeCardEffect(cardKey, simulated) {
  const cData = CARD_MASTER[cardKey];
  if (!cData) return;
  let baseVal = cData.value;
  
  if (cData.type === "ATK") baseVal += activeAccuracyBonus;
  
  let finalVal = baseVal;
  let playerFinalPowerBonus = pPower + (pRelics.redGem ? 2 : 0); 
  if (cData.type === "ATK" && pWeak > 0) finalVal = Math.floor(finalVal * 0.5);

  if (cData.type === "ATK") {
    if(!simulated) {
      sfxAttack();
      enemyShakeFrame = 8;
      turnAtkCount++;
      combatAtkCount++;
      
      if (activeOrcChallenge && eHP > 0) {
        eBlock += 4;
        dmgPopups.push({ text: "CHALLENGE BLOCK +4", x: 380, y: 120, col: CYAN, frames: 30 });
      }
      
      if(activeRupturesCount > 0) {
        pPower += activeRupturesCount;
        dmgPopups.push({ text: `RUPTURES +${activeRupturesCount} POW`, x: 100, y: 150, col: PURPLE, frames: 35 });
      }

      if(pRelics.ninjaScroll && turnAtkCount % 3 === 0) {
        eHP -= 4;
        dmgPopups.push({ text: "SCROLL SHURIKEN -4", x: 380, y: 110, col: YELLOW, frames: 35 });
      }
    }

    let isCrit = Math.random() < 0.05;
    let baseDmg = finalVal + playerFinalPowerBonus;
    
    if (cData.isShieldBash) {
      baseDmg = Math.floor(pBlock * (cData.valueFactor || 0.7));
    } else if (cData.isExecute) {
      if (eHP <= (eMaxHP / 2)) baseDmg = 20;
    } else if (cData.isFortress) {
      baseDmg = finalVal + Math.floor(pBlock * 0.5);
    } else if (cData.isToxicDmg) {
      baseDmg = finalVal + (ePoison * 3);
    } else if (cData.isBarrierBlast) {
      baseDmg = finalVal + pBlock; 
    } else if (cData.isBodySlam) {
      baseDmg = pBlock;
    } else if (cData.isShieldSlam) {
      baseDmg = pBlock * (cData.factor || 2);
      if(!simulated) {
        pBlock = 0;
      }
    } else if (cData.isPoisonBurst) {
      baseDmg = 0;
      if(!simulated) {
        ePoison *= (cData.factor || 2);
        dmgPopups.push({ text: `💥BURST POIS x${cData.factor || 2} (${ePoison})`, x: 380, y: 130, col: GREEN, frames: 45 });
      }
    } else if (cData.strengthSynergy) {
      baseDmg = finalVal + playerFinalPowerBonus;
      if(playerFinalPowerBonus > 0 && !simulated) {
        pPower += 1;
        dmgPopups.push({ text: "HEAVY STRGT +1 POW", x: 100, y: 130, col: PURPLE, frames: 35 });
      }
    } else if (cData.isCatalyst) {
      baseDmg = 0;
      if(!simulated) {
        ePoison *= 2;
        dmgPopups.push({ text: `💥CATALYST POIS x2 (${ePoison})`, x: 380, y: 130, col: GREEN, frames: 45 });
      }
    } else if (cData.risky) {
      baseDmg = cData.value;
      if(!simulated && Math.random() < (cData.riskyProb || 0.3)) {
        pHP = Math.max(1, pHP - (cData.riskyDmg || 4));
        dmgPopups.push({ text: `WILD RECOIL -${cData.riskyDmg || 4} HP`, x: 100, y: 160, col: RED, frames: 35 });
      }
    } else if (cData.isOffering) {
      baseDmg = 12 + activeAccuracyBonus;
      if(!simulated) {
        pHP = Math.max(1, pHP - 3);
        dmgPopups.push({ text: "OFFERING SACRIFICE -3 HP", x: 100, y: 160, col: RED, frames: 35 });
      }
    } else if (cData.isFlask) {
      baseDmg = 0;
      if (!simulated) {
        let times = cData.poisonTimes || 3;
        let pVal = cData.poisonVal || 3;
        let totalAdded = 0;
        for (let t = 0; t < times; t++) {
          let pGain = pVal + (pRelics.sneckoSkull ? 1 : 0);
          ePoison += pGain;
          totalAdded += pGain;
        }
        dmgPopups.push({ text: `FLASK POISON +${totalAdded}`, x: 380, y: 140, col: GREEN, frames: 45 });
      }
    } else if (cData.isThunderStrike) {
      baseDmg = combatAtkCount * (cData.factor || 5);
    }

    let dmg = isCrit ? baseDmg * 2 : baseDmg;
    if (eType && eVuln > 0) dmg = Math.floor(dmg * 1.5);

    if (dmg > 0) {
      if (eBlock >= dmg) {
        eBlock -= dmg;
        if(!simulated) dmgPopups.push({ text: "ENEMY BLOCKED", x: 380, y: 160, col: "#00c8d0", frames: 40 });
      } else {
        dmg -= eBlock; eBlock = 0; eHP -= dmg;
        if(!simulated) {
          let popText = isCrit ? `💥CRITICAL! -${dmg}` : `-${dmg}`;
          dmgPopups.push({ text: popText, x: 380, y: 150, col: isCrit ? YELLOW : RED, frames: 45 });
        }
      }
    }

    if (!simulated) {
      if (eThorns > 0) {
        pHP -= eThorns;
        dmgPopups.push({ text: `THORNS -${eThorns}`, x: 100, y: 175, col: RED, frames: 35 });
        flashFrame = 6;
        if (pHP <= 0) { pHP = 0; gameState = "GAMEOVER"; }
      }

      if (cData.vamp) {
        const healAmount = Math.floor(dmg * cData.vamp);
        pHP = Math.min(pMaxHP, pHP + healAmount);
        dmgPopups.push({ text: `+${healAmount} VAMP`, x: 100, y: 145, col: GREEN, frames: 40 });
      }
      if (cData.poison) {
        let pGain = cData.poison + (pRelics.sneckoSkull ? 1 : 0);
        ePoison += pGain;
        dmgPopups.push({ text: `POISON +${pGain}`, x: 380, y: 140, col: GREEN, frames: 35 });
      }
      if (cData.addBlock) pBlock += cData.addBlock;
      if (cData.applyWeak) {
        eWeak += cData.applyWeak;
        dmgPopups.push({ text: `WEAKENED +${cData.applyWeak}`, x: 380, y: 120, col: GREEN, frames: 35 });
      }
      if (cData.vuln) {
        eVuln += cData.vuln;
        dmgPopups.push({ text: `VULNERABLE +${cData.vuln}`, x: 380, y: 130, col: YELLOW, frames: 35 });
      } 
    }

  } else if (cData.type === "DEF") {
    if(!simulated) {
      sfxDefend();
      turnDefCount++;
      
      if(pRelics.letterOpener && turnDefCount % 3 === 0) {
        eHP -= 6;
        dmgPopups.push({ text: "OPENER SLASH -6", x: 380, y: 110, col: CYAN, frames: 35 });
      }
    }

    let blockGain = finalVal;
    if (cData.exhaustSynergy) {
      if(!simulated) {
        let count = hand.length;
        triggerDiscardBlockLogic(count); 
        discard.push(...hand); hand = [];
        blockGain += (count * 4);
        dmgPopups.push({ text: `EXHAUST WIND +${count * 4}`, x: 100, y: 130, col: CYAN, frames: 40 });
        
        for(let ex=0; ex<count; ex++) triggerExhaustLogic(); 
      }
    }
    if (cData.isTrueGrit && !simulated) {
      if (hand.length > 0) {
        let rIdx = Math.floor(Math.random() * hand.length);
        hand.splice(rIdx, 1);
        dmgPopups.push({ text: "🔥EXHAUSTED", x: 256, y: 260, col: GRAY, frames: 35 });
        triggerExhaustLogic();
      }
    }

    if (cData.isArmaments && !simulated) {
      let upgradeables = [];
      for (let i = 0; i < hand.length; i++) {
        let card = hand[i];
        if (CARD_MASTER[card + "+"]) {
          upgradeables.push(i);
        }
      }
      if (upgradeables.length > 0) {
        let target = upgradeables[Math.floor(Math.random() * upgradeables.length)];
        hand[target] = hand[target] + "+";
        dmgPopups.push({ text: `UPGRADED: ${CARD_MASTER[hand[target]].name}`, x: 256, y: 240, col: YELLOW, frames: 45 });
      }
    }

    if (cData.isDodge && !simulated) {
      nextTurnBlock += cData.nextBlock || 4;
      dmgPopups.push({ text: `NEXT BLOCK +${cData.nextBlock || 4}`, x: 100, y: 135, col: CYAN, frames: 35 });
    }

    if (pFrail > 0) {
      blockGain = Math.floor(blockGain * 0.5);
    }

    if(cData.reflectPower && !simulated) {
      pReflect += cData.reflectPower;
      dmgPopups.push({ text: `REFLECT SHIELD +${cData.reflectPower}`, x: 100, y: 130, col: RED, frames: 35 });
    }

    pBlock += blockGain;
    if(!simulated) dmgPopups.push({ text: `+${blockGain}`, x: 100, y: 160, col: CYAN, frames: 40 });

  } else if (cData.type === "POW") {
    if(!simulated) {
      sfxRarePower();
      if(cData.ruptures) activeRupturesCount++;
      if(cData.ironSkin) activeIronSkinCount++;
      if(cData.accuracyBuff) activeAccuracyBonus += cData.accuracyBuff;
      if(cData.shivGen) activeInfiniteBladesCount++;
      if(cData.darkEmbrace) activeDarkEmbraceCount++;
      if(cData.feelNoPain) activeFeelNoPainCount += cData.value;
      
      if(cData.adrenaline) {
        pEnergy += cData.adrenalineVal || 2;
        nextTurnEnergyMod = -1; 
        dmgPopups.push({ text: `ADRENALINE NRG +${cData.adrenalineVal || 2}`, x: 100, y: 130, col: BLUE, frames: 40 });
      }
      
      pPower += finalVal; 
      if(cardKey === "rage") pBlock = 0; 
      if(cData.chargeBlock) {
        pBlock += cData.chargeBlock;
        dmgPopups.push({ text: `CHARGE BLK +${cData.chargeBlock}`, x: 100, y: 130, col: CYAN, frames: 35 });
      }
      
      if(cData.dualWield) {
        let attackKeys = Object.keys(CARD_MASTER).filter(k => CARD_MASTER[k].type === "ATK");
        let spawned = attackKeys[Math.floor(Math.random() * attackKeys.length)];
        if(hand.length < 10) {
          hand.push(spawned);
          handCostMods.push(0);
        }
      }
      
      if(cData.combust) {
        activeCombustCount += cData.combust;
        dmgPopups.push({ text: `COMBUST ACTIVE`, x: 100, y: 130, col: RED, frames: 40 });
      }
      if(cData.setup) {
        nextCardCostMod = 1;
        dmgPopups.push({ text: `SETUP COST -1`, x: 100, y: 130, col: CYAN, frames: 40 });
      }
      if (cData.isDoubleEnergy && !simulated) {
        pEnergy = pEnergy * 2;
        dmgPopups.push({ text: `ENERGY DOUBLED: ${pEnergy}`, x: 100, y: 130, col: BLUE, frames: 40 });
      }

      if (pRelics.mummifiedHand && hand.length > 0) {
        let targets = [];
        for (let i = 0; i < hand.length; i++) {
          let baseCost = CARD_MASTER[hand[i]].cost;
          let actualCost = Math.max(0, baseCost - (handCostMods[i] || 0));
          if (actualCost > 0) targets.push(i);
        }
        if (targets.length > 0) {
          let target = targets[Math.floor(Math.random() * targets.length)];
          handCostMods[target] = CARD_MASTER[hand[target]].cost;
          dmgPopups.push({ text: `MUMMY HAND: ${CARD_MASTER[hand[target]].name} COST 0`, x: 256, y: 220, col: YELLOW, frames: 45 });
        }
      }

      dmgPopups.push({ text: `POWER ACTIVE!`, x: 100, y: 150, col: PURPLE, frames: 45 });
    }
  } else if (cData.type === "HEAL") {
    if(!simulated) {
      sfxRare();
      pHP = Math.min(pMaxHP, pHP + finalVal);
      dmgPopups.push({ text: `+${finalVal} HEAL`, x: 100, y: 160, col: GREEN, frames: 40 });
    }
  }

  if (!simulated && cData.draw) drawCards(cData.draw);
}

// ==================== クリック・ロジック ====================
cv.addEventListener('mousemove', e => {
  const rect = cv.getBoundingClientRect();
  mx = (e.clientX - rect.left) * (512 / rect.width);
  my = (e.clientY - rect.top) * (460 / rect.height);
});

cv.addEventListener('click', e => {
  const rect = cv.getBoundingClientRect();
  mx = (e.clientX - rect.left) * (512 / rect.width);
  my = (e.clientY - rect.top) * (460 / rect.height);

  if (gameState === "GAMEOVER" || gameState === "ENDING") { initGame(); return; }

  if (gameState === "CLASS_SELECT") {
    const boxW = 148, boxH = 210;
    
    // Warrior
    let wX = 24, wY = 130;
    if (mx >= wX && mx <= wX + boxW && my >= wY && my <= wY + boxH) {
      pClass = "WARRIOR";
      pMaxHP = 50; pHP = 50;
      masterDeck = ["strike", "strike", "strike", "strike", "strike", "defend", "defend", "defend", "defend", "bash", "quick"];
      sfxLvUp();
      initFloor();
      return;
    }
    
    // Silent
    let sX = 182, sY = 130;
    if (mx >= sX && mx <= sX + boxW && my >= sY && my <= sY + boxH) {
      pClass = "SILENT";
      pMaxHP = 40; pHP = 40;
      masterDeck = ["strike", "strike", "strike", "strike", "defend", "defend", "defend", "defend", "defend", "quick", "quick", "poisonD"];
      sfxLvUp();
      initFloor();
      return;
    }
    
    // Mage
    let mX = 340, mY = 130;
    if (mx >= mX && mx <= mX + boxW && my >= mY && my <= mY + boxH) {
      pClass = "MAGE";
      pMaxHP = 35; pHP = 35;
      masterDeck = ["strike", "strike", "strike", "strike", "defend", "defend", "defend", "defend", "zap", "zap", "charge"];
      sfxLvUp();
      initFloor();
      return;
    }
    return;
  }

  if (gameState === "EVENT") {
    if (eventType === "altar") {
      if (mx >= 60 && mx <= 452 && my >= 150 && my <= 200) {
        pHP = Math.min(pMaxHP, pHP + 20);
        sfxRare();
        initFloor();
      } else if (mx >= 60 && mx <= 452 && my >= 220 && my <= 270) {
        let upgradeables = masterDeck.filter(k => CARD_MASTER[k + "+"]);
        if (upgradeables.length > 0) {
          let rK = upgradeables[Math.floor(Math.random() * upgradeables.length)];
          let idx = masterDeck.indexOf(rK);
          masterDeck[idx] = rK + "+";
          sfxRare();
        }
        initFloor();
      } else if (mx >= 60 && mx <= 452 && my >= 290 && my <= 340) {
        let unownedRelics = Object.keys(RELIC_MASTER).filter(k => !pRelics[k]);
        if (unownedRelics.length > 0) {
          let rR = unownedRelics[Math.floor(Math.random() * unownedRelics.length)];
          pRelics[rR] = true;
        }
        masterDeck.push("regret");
        sfxRare();
        initFloor();
      }
    } else if (eventType === "fountain") {
      if (mx >= 60 && mx <= 452 && my >= 150 && my <= 200) {
        masterDeck = masterDeck.map(k => k === "strike" ? "strike+" : k);
        sfxLvUp();
        initFloor();
      } else if (mx >= 60 && mx <= 452 && my >= 220 && my <= 270) {
        if (masterDeck.length > 0) {
          let rIdx = Math.floor(Math.random() * masterDeck.length);
          masterDeck.splice(rIdx, 1);
          let rareKeys = Object.keys(CARD_MASTER).filter(k => CARD_MASTER[k].rare === "RARE" && k !== "regret" && k !== "decay");
          let spawned = rareKeys[Math.floor(Math.random() * rareKeys.length)];
          masterDeck.push(spawned);
          sfxRare();
        }
        initFloor();
      } else if (mx >= 60 && mx <= 452 && my >= 290 && my <= 340) {
        initFloor();
      }
    } else if (eventType === "merchant") {
      if (mx >= 60 && mx <= 452 && my >= 150 && my <= 200) {
        pGold += 80;
        masterDeck.push("decay");
        sfxRare();
        initFloor();
      } else if (mx >= 60 && mx <= 452 && my >= 220 && my <= 270) {
        if (masterDeck.length > 3) {
          let rIdx = Math.floor(Math.random() * masterDeck.length);
          masterDeck.splice(rIdx, 1);
          sfxAttack();
        }
        initFloor();
      } else if (mx >= 60 && mx <= 452 && my >= 290 && my <= 340) {
        initFloor();
      }
    } else if (eventType === "mimic") {
      if (mx >= 60 && mx <= 452 && my >= 150 && my <= 200) {
        let unowned = Object.keys(RELIC_MASTER).filter(k => !pRelics[k]);
        if (unowned.length > 0) {
          let rR = unowned[Math.floor(Math.random() * unowned.length)];
          pRelics[rR] = true;
        }
        if (Math.random() < 0.5) {
          pHP = Math.max(1, pHP - 20);
          dmgPopups.push({ text: "TRAP! -20 HP", x: 256, y: 200, col: RED, frames: 40 });
          sfxDeath();
        } else {
          dmgPopups.push({ text: "SAFE!", x: 256, y: 200, col: GREEN, frames: 40 });
          sfxRare();
        }
        initFloor();
      } else if (mx >= 60 && mx <= 452 && my >= 220 && my <= 270) {
        if (pGold >= 25) {
          pGold -= 25;
          let unowned = Object.keys(RELIC_MASTER).filter(k => !pRelics[k]);
          if (unowned.length > 0) {
            let rR = unowned[Math.floor(Math.random() * unowned.length)];
            pRelics[rR] = true;
          }
          sfxRare();
          initFloor();
        } else {
          beep(140, 0.08, 'square', 0.1); 
        }
      } else if (mx >= 60 && mx <= 452 && my >= 290 && my <= 340) {
        initFloor();
      }
    }
    return;
  }

  if (gameState === "LEVELUP") {
    if (mx >= 50 && mx <= 170 && my >= 200 && my <= 260) {
      pMaxHP += 5; pHP += 5; generateRewardOptions();
    } else if (mx >= 196 && mx <= 316 && my >= 200 && my <= 260) {
      pMaxEnergy += 1; generateRewardOptions();
    } else if (mx >= 342 && mx <= 462 && my >= 200 && my <= 260) {
      let upgradeables = masterDeck.filter(k => CARD_MASTER[k + "+"]);
      if (upgradeables.length > 0) {
        gameState = "UPGRADE_SCREEN";
      } else {
        generateRewardOptions();
      }
    }
    return;
  }

  if (gameState === "UPGRADE_SCREEN") {
    let startX = 46, startY = 90;
    for(let i=0; i<masterDeck.length; i++) {
      let cardKey = masterDeck[i];
      let isUpgradeable = CARD_MASTER[cardKey + "+"] !== undefined;
      if (!isUpgradeable) continue;
      
      let rX = startX + (i % 5) * 84;
      let rY = startY + Math.floor(i / 5) * 50;
      if (mx >= rX && mx <= rX + 76 && my >= rY && my <= rY + 40) {
        masterDeck[i] = cardKey + "+"; 
        sfxRare();
        generateRewardOptions(); 
        return;
      }
    }
    return;
  }

  if (gameState === "REWARD") {
    if (mx >= 196 && mx <= 316 && my >= 315 && my <= 345) {
      pHP = Math.min(pMaxHP, pHP + 15);
      proceedToNextFloor(); return;
    }
    const rwW = 100, rwH = 150, rY = 135;
    for(let i=0; i<3; i++) {
      let rx = 76 + i * 130;
      if (mx >= rx && mx <= rx + rwW && my >= rY && my <= rY + rwH) {
        masterDeck.push(rewardOptions[i]); 
        proceedToNextFloor(); return;
      }
    }
    return;
  }

  if (gameState === "SHOP") {
    const sW = 86, sH = 150, sY = 125, gap = 10;
    for(let i=0; i<shopInventory.length; i++) {
      let item = shopInventory[i];
      let sX = 18 + i * (sW + gap);
      if (mx >= sX && mx <= sX + sW && my >= sY && my <= sY + sH && !item.bought) {
        if (pGold >= item.cost) {
          pGold -= item.cost;
          sfxRare();
          
          if (item.type === "REMOVE") {
            activeShopItemIdx = i; 
            gameState = "SHOP_REMOVE"; 
          } else if (item.type === "POTION") {
            if (pPotions.length < 2) {
              item.bought = true;
              let types = ["healP", "poisP", "shieldP"];
              let rType = types[Math.floor(Math.random() * types.length)];
              pPotions.push(rType);
              dmgPopups.push({ text: `BOUGHT: ${POTION_MASTER[rType].name}`, x: 256, y: 200, col: GREEN, frames: 35 });
            } else {
              pGold += item.cost; 
              beep(140, 0.08, 'square', 0.1);
              dmgPopups.push({ text: "SLOTS FULL", x: 256, y: 200, col: RED, frames: 30 });
            }
          } else if (item.type === "RELIC") {
            item.bought = true;
            pRelics[item.relicKey] = true; 
            dmgPopups.push({ text: "RELIC ACTIVE!", x: 256, y: 200, col: YELLOW, frames: 40 });
          } else if (item.type === "CARD") {
            item.bought = true;
            masterDeck.push(item.cardKey); 
          }
        }
        return;
      }
    }
    if (mx >= 206 && mx <= 306 && my >= 330 && my <= 360) {
      currentFloor++; initFloor();
    }
    return;
  }

  if (gameState === "SHOP_REMOVE") {
    let startX = 46, startY = 90;
    for(let i=0; i<masterDeck.length; i++) {
      let rX = startX + (i % 5) * 84;
      let rY = startY + Math.floor(i / 5) * 50;
      if (mx >= rX && mx <= rX + 76 && my >= rY && my <= rY + 40) {
        masterDeck.splice(i, 1); 
        sfxAttack();
        if(activeShopItemIdx !== -1) {
          shopInventory[activeShopItemIdx].bought = true; 
        }
        gameState = "SHOP"; 
        return;
      }
    }
    return;
  }

  if (gameState === "BATTLE") {
    let potY = 52;
    for (let i = 0; i < pPotions.length; i++) {
      let potX = 20 + i * 28;
      if (mx >= potX && mx <= potX + 22 && my >= potY && my <= potY + 22) {
        let pot = pPotions[i];
        if (pot === "healP") {
          pHP = Math.min(pMaxHP, pHP + 15);
          dmgPopups.push({ text: "+15 HP HEALED", x: 100, y: 160, col: GREEN, frames: 35 });
        } else if (pot === "poisP") {
          let pGain = 5 + (pRelics.sneckoSkull ? 1 : 0);
          ePoison += pGain;
          dmgPopups.push({ text: `POISON +${pGain}`, x: 380, y: 140, col: GREEN, frames: 35 });
        } else if (pot === "shieldP") {
          pBlock += 8;
          dmgPopups.push({ text: "+8 BLOCK", x: 100, y: 160, col: CYAN, frames: 35 });
        }
        sfxDefend();
        pPotions.splice(i, 1);
        selectedIdx = -1; 
        return;
      }
    }
  }

  if (gameState !== "BATTLE") return;

  // ターン終了ボタン判定
  if (mx >= 415 && mx <= 495 && my >= 298 && my <= 328) {
    runEnemyTurn(); return;
  }

  // 【クリック解決処理の完全修正】
  // selectedIdx は毎フレーム描画ループ内で正確にマウス座標から再取得されているため、ここでの再走査は不要です。
  if (selectedIdx !== -1 && selectedIdx < hand.length) {
    const targetIdx = selectedIdx; // 割り込みによるインデックスズレを防止
    const cardKey = hand[targetIdx];
    const cData = CARD_MASTER[cardKey];

    let currentCost = Math.max(0, cData.cost - nextCardCostMod - (handCostMods[targetIdx] || 0));
    if (pEnergy >= currentCost) {
      pEnergy -= currentCost;
      if (nextCardCostMod > 0) nextCardCostMod = 0; // コスト軽減バフを消費
      
      // 先に手札から配列を安全に抜く
      hand.splice(targetIdx, 1);
      handCostMods.splice(targetIdx, 1);
      
      let isExhausted = cData.exhaust;
      if (!isExhausted) {
        discard.push(cardKey);
      } else {
        dmgPopups.push({ text: "🔥EXHAUSTED", x: 256, y: 260, col: GRAY, frames: 35 });
        triggerExhaustLogic();
      }

      let triggerEcho = (pRelics.echoRing && cData.type === "ATK" && isFirstAtkInTurn);
      if(cData.type === "ATK" && isFirstAtkInTurn) isFirstAtkInTurn = false;

      executeCardEffect(cardKey, false);

      if (triggerEcho && eHP > 0) {
        setTimeout(() => {
          if (eHP > 0) {
            dmgPopups.push({ text: "✨ECHO RING!", x: 256, y: 180, col: PURPLE, frames: 35 });
            executeCardEffect(cardKey, false);
          }
        }, 250);
      }

      // 処理が全て終わった直後にインデックスをクリーンアップ
      selectedIdx = -1;

      if (eHP <= 0) {
        eHP = 0;
        hand = []; discard = []; 
        triggerEnemyDeathAnim(); 
      }
    } else {
      beep(140, 0.08, 'square', 0.1); 
    }
  }
});

// キーボードイベント側も完全に同期化
window.addEventListener('keydown', e => {
  if (gameState !== "BATTLE") return;
  if (e.code === "Space") {
    runEnemyTurn();
  }
  if (e.key >= '1' && e.key <= '9') {
    let idx = parseInt(e.key) - 1;
    if (idx < hand.length) {
      selectedIdx = idx; // 選択インデックスを強制上書きしてクリックイベントを発火
      cv.dispatchEvent(new Event('click'));
    }
  }
});

function loop() {
  fc++; 
  if (enemyShakeFrame > 0) enemyShakeFrame--;
  
  if (gameState === "DEATH_ANIM") {
    enemyDeathFrame--;
    if (enemyDeathFrame <= 0) {
      handleEnemyDeathFinal(); 
    }
  }

  cx.save();
  cx.scale(1.5, 1.5);
  drawUI();
  drawCRT();
  cx.restore();

  requestAnimationFrame(loop);
}

initGame();
loop();
</script>
